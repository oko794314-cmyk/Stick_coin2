<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Farm</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--accent); letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .balance { font-size: 3em; font-family: monospace; margin: 20px 0; font-weight: bold; }
        .status { color: #7BEF; font-size: 0.85em; margin-top: 10px; }
        .logout { background: #333; color: #ff4444; font-size: 0.8em; margin-top: 30px; }
    </style>
</head>
<body>

    <!-- Екран входу -->
    <div class="container" id="auth-screen">
        <h1>LOGIN</h1>
        <input type="text" id="userIn" placeholder="Логін">
        <input type="password" id="passIn" placeholder="Пароль">
        <button onclick="login()">УВІЙТИ</button>
    </div>

    <!-- Головний екран -->
    <div class="container" id="main-screen" style="display:none;">
        <h2 id="user-display">USER</h2>
        <div style="color: #7BEF; font-size: 0.8em;">ЗАГАЛЬНИЙ БАЛАНС</div>
        <div class="balance" id="balance-num">0.00000</div>
        <p class="status" id="sync-time">Очікування синхронізації...</p>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        
        <input type="password" id="newPass" placeholder="Новий пароль">
        <button onclick="changePassword()" style="background:none; border:1px solid var(--accent); color:var(--accent)">ЗМІНИТИ ПАРОЛЬ</button>
        
        <button class="logout" onclick="logout()">ВИЙТИ З АКАУНТА</button>
    </div>

<script>
    const BIN_ID = "6a04f5aaadc21f119a979f14";
    const MASTER_KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let currentUser = null;

    window.onload = () => {
        const saved = localStorage.getItem("stick_user");
        if (saved) { currentUser = saved; showMain(); }
    };

    async function login() {
        const u = document.getElementById("userIn").value.trim();
        const p = document.getElementById("passIn").value.trim();
        if(!u || !p) return alert("Заповніть поля!");

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" }
            });
            const data = await res.json();
            if (data.users[u] && data.users[u].password === p) {
                currentUser = u;
                localStorage.setItem("stick_user", u);
                showMain();
            } else alert("Невірний логін або пароль!");
        } catch (e) { alert("Помилка підключення до бази!"); }
    }

    function showMain() {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("main-screen").style.display = "block";
        document.getElementById("user-display").innerText = currentUser.toUpperCase();
        updateBalance();
        setInterval(updateBalance, 10000);
    }

    async function updateBalance() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" }
            });
            const data = await res.json();
            const val = data.users[currentUser].balance;
            document.getElementById("balance-num").innerText = val.toFixed(5);
            document.getElementById("sync-time").innerText = "Оновлено: " + new Date().toLocaleTimeString();
        } catch (e) { console.log("Помилка оновлення"); }
    }

    async function changePassword() {
        const newP = document.getElementById("newPass").value.trim();
        if (newP.length < 4) return alert("Пароль занадто короткий!");
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" }
            });
            let data = await res.json();
            data.users[currentUser].password = newP;
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: "PUT",
                headers: { "X-Master-Key": MASTER_KEY, "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Пароль успішно змінено!");
            document.getElementById("newPass").value = "";
        } catch (e) { alert("Помилка збереження"); }
    }

    function logout() {
        localStorage.removeItem("stick_user");
        location.reload();
    }
</script>
</body>
</html>
