<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STICK FARM PRO ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FF; --bg: #030303; --card: rgba(15, 15, 25, 0.95);
            --t: #ffffff; --g: #00ff88; --r: #ff3366; --gold: #ffcc00;
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(circle at 50% 0%, #0a1a3e 0%, #000 70%); z-index: -1; }
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { width: 85%; max-width: 340px; padding: 30px; text-align: center; }
        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; border: 1px solid #333; border-radius: 8px; cursor: pointer; color: #666; font-size: 12px; }
        .auth-tab.active { border-color: var(--p); color: var(--p); background: rgba(7, 255, 255, 0.05); }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; background: var(--p); color: #000; cursor: pointer; text-transform: uppercase; transition: 0.2s; }

        /* Main UI */
        #app { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 15px 10px; display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; padding-top: env(safe-area-inset-top, 15px); }
        .h-item { text-align: center; }
        .h-label { font-size: 8px; color: #666; display: block; }
        .h-val { font-size: 12px; color: var(--p); font-weight: 700; }

        .view { flex: 1; padding: 20px; display: none; overflow-y: auto; padding-bottom: 100px; }
        .view.on { display: block; }
        #bal { font-size: 3rem; font-weight: 900; text-align: center; margin: 20px 0; color: #fff; text-shadow: 0 0 20px var(--p); }
        .m-orb { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--g); margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; }
        .m-orb.active { border-color: var(--r); box-shadow: 0 0 40px var(--r); }

        .item-card { padding: 12px 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid #222; }

        nav { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(6, 1fr); background: #000; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom, 10px); padding-top: 10px; }
        .tab { text-align: center; font-size: 20px; color: #444; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .tab.on { color: var(--p); }
        .tab-label { font-size: 8px; text-transform: uppercase; font-weight: 700; }
        
        .sync-led { width: 8px; height: 8px; border-radius: 50%; background: #333; display: inline-block; margin-right: 5px; }
        .sync-on { background: var(--g); box-shadow: 0 0 5px var(--g); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box glass">
            <h2 style="margin-bottom: 20px; letter-spacing: 5px;">STICK<span style="color:var(--p)">FARM</span></h2>
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">ВХІД</div>
                <div class="auth-tab" id="tab-reg">РЕЄСТРАЦІЯ</div>
            </div>
            <input type="text" id="u" placeholder="ЛОГІН" autocomplete="off">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="auth-btn" class="btn">ВВІЙТИ</button>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="h-item"><span class="h-label">БАЛАНС</span><span id="h-bal" class="h-val">0.00</span></div>
            <div class="h-item"><span class="h-label">РІВЕНЬ</span><span id="h-lvl" class="h-val">1</span></div>
            <div class="h-item"><span class="h-label">SYNC</span><span class="h-val"><div id="led" class="sync-led"></div>OK</span></div>
        </div>

        <div id="v-mine" class="view on">
            <div id="bal">0.00000</div>
            <div id="mbtn" class="m-orb">START</div>
            <p style="text-align:center; font-size:9px; color:#555; margin-top:20px;">MULTI-DEVICE SYNC ENABLED</p>
        </div>

        <div id="v-social" class="view"><h4>ТОП ГРАВЦІВ</h4><div id="leaderboard"></div></div>
        <div id="v-tx" class="view">
            <h4>ПЕРЕКАЗ STK</h4>
            <div class="glass" style="padding: 15px;">
                <input type="text" id="tx-to" placeholder="ОТРИМУВАЧ">
                <input type="number" id="tx-amt" placeholder="СУМА">
                <button onclick="sendSTK()" class="btn">ВІДПРАВИТИ</button>
            </div>
        </div>
        <div id="v-friends" class="view"><h4>ДРУЗІ</h4><div id="friend-list"></div></div>
        <div id="v-games" class="view">
            <h4>CASINO</h4>
            <div class="glass" style="padding: 20px; text-align: center;">
                <input type="number" id="bet-amt" placeholder="СТАВКА">
                <button onclick="playDouble()" class="btn" style="background:var(--gold);">ГРАТИ</button>
            </div>
        </div>
        <div id="v-os" class="view"><h4>SYSTEM</h4><div class="glass item-card"><span>ID:</span> <span id="prof-id" style="color:var(--p)">---</span></div><button onclick="logout()" class="btn" style="background:var(--r); color:#fff; margin-top:20px;">LOGOUT</button></div>

        <nav>
            <div class="tab on" data-v="v-mine"><span>⛏️</span><span class="tab-label">Mine</span></div>
            <div class="tab" data-v="v-social"><span>🏆</span><span class="tab-label">Top</span></div>
            <div class="tab" data-v="v-tx"><span>💸</span><span class="tab-label">Send</span></div>
            <div class="tab" data-v="v-friends"><span>👥</span><span class="tab-label">Friends</span></div>
            <div class="tab" data-v="v-games"><span>🎰</span><span class="tab-label">Game</span></div>
            <div class="tab" data-v="v-os"><span>⚙️</span><span class="tab-label">OS</span></div>
        </nav>
    </div>

    <script>
        const BID = "6a04f5aaadc21f119a979f14";
        const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
        const URL = `https://api.jsonbin.io/v3/b/${BID}`;

        let db = { users: {} };
        let cur = null;
        let isMining = false;
        let isRegMode = false;
        let balance = 0; // Актуальний баланс із хмари
        let unpushedBalance = 0; // Те, що намайнено на цьому пристрої і ще не відправлено

        // Auth
        document.getElementById('tab-login').onclick = () => { isRegMode = false; updateAuthTabs(); };
        document.getElementById('tab-reg').onclick = () => { isRegMode = true; updateAuthTabs(); };
        function updateAuthTabs() {
            document.getElementById('tab-login').classList.toggle('active', !isRegMode);
            document.getElementById('tab-reg').classList.toggle('active', isRegMode);
            document.getElementById('auth-btn').innerText = isRegMode ? "РЕЄСТРАЦІЯ" : "ВВІЙТИ";
        }

        document.getElementById('auth-btn').onclick = async () => {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            if(!u || !p) return alert("Заповніть поля");

            document.getElementById('auth-btn').innerText = "CONNECTING...";
            const res = await fetch(URL + "/latest", { headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" } });
            db = await res.json();

            if(isRegMode) {
                if(db.users[u]) return alert("Зайнято");
                db.users[u] = { password: p, balance: 0 };
                await saveToCloud();
                alert("Готово!"); location.reload();
            } else {
                if(db.users[u] && db.users[u].password === p) {
                    cur = u;
                    balance = db.users[u].balance || 0;
                    enterApp();
                } else {
                    alert("Помилка"); location.reload();
                }
            }
        };

        function enterApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('prof-id').innerText = cur;
            updateUI();
            setInterval(syncProcess, 15000); // Синхронізація кожні 15 сек
        }

        // Mining
        document.getElementById('mbtn').onclick = function() {
            isMining = !isMining;
            this.classList.toggle('active', isMining);
            this.innerText = isMining ? "STOP" : "START";
            if(isMining) mineTick();
        };

        function mineTick() {
            if(!isMining) return;
            let gain = (1 / 3600); 
            unpushedBalance += gain; // Додаємо до локального невідправленого залишку
            updateUI();
            setTimeout(mineTick, 1000);
        }

        function updateUI() {
            let total = balance + unpushedBalance;
            document.getElementById('bal').innerText = total.toFixed(5);
            document.getElementById('h-bal').innerText = total.toFixed(2);
            document.getElementById('h-lvl').innerText = Math.floor(total / 10) + 1;
        }

        // Смарт-синхронізація
        async function syncProcess() {
            const led = document.getElementById('led');
            led.classList.add('sync-on');

            try {
                // 1. Отримуємо свіжі дані (хтось інший міг намайнити)
                const res = await fetch(URL + "/latest", { headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" } });
                const freshDB = await res.json();
                
                // 2. Оновлюємо наш основний баланс із хмари
                balance = freshDB.users[cur].balance || 0;
                
                // 3. Додаємо наш локальний видобуток до хмарного балансу
                freshDB.users[cur].balance = balance + unpushedBalance;
                
                // 4. Відправляємо оновлену суму назад
                await fetch(URL, {
                    method: 'PUT',
                    headers: { "Content-Type": "application/json", "X-Master-Key": KEY },
                    body: JSON.stringify(freshDB)
                });

                // 5. Тільки якщо запит успішний — очищаємо локальний "невідправлений" залишок
                balance += unpushedBalance;
                unpushedBalance = 0;
                db = freshDB; 

            } catch (e) { console.log("Sync error"); }
            
            setTimeout(() => led.classList.remove('sync-on'), 1000);
            updateUI();
        }

        async function saveToCloud() {
            await fetch(URL, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": KEY },
                body: JSON.stringify(db)
            });
        }

        // Casino & Transactions
        async function playDouble() {
            const amt = parseFloat(document.getElementById('bet-amt').value);
            if(amt > (balance + unpushedBalance) || amt <= 0) return alert("Мало STK");
            const win = Math.random() > 0.5;
            unpushedBalance = win ? unpushedBalance + amt : unpushedBalance - amt;
            alert(win ? "WIN! 🎉" : "LOSE... 💀");
            syncProcess();
        }

        async function sendSTK() {
            const to = document.getElementById('tx-to').value.trim().toLowerCase();
            const amt = parseFloat(document.getElementById('tx-amt').value);
            if(!db.users[to]) return alert("Немає такого юзера");
            if(amt > (balance + unpushedBalance)) return alert("Мало STK");
            
            unpushedBalance -= amt;
            await syncProcess(); // Відправляємо негайно
            alert("Sent!");
        }

        function renderTop() {
            const list = document.getElementById('leaderboard');
            const sorted = Object.entries(db.users).sort((a,b) => (b[1].balance||0) - (a[1].balance||0));
            list.innerHTML = sorted.map(([n, d], i) => `
                <div class="item-card"><span>#${i+1} ${n}</span><span style="color:var(--g)">${(d.balance||0).toFixed(2)} STK</span></div>
            `).join('');
        }

        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
                t.classList.add('on');
                document.getElementById(t.dataset.v).classList.add('on');
                if(t.dataset.v === 'v-social') renderTop();
            };
        });

        function logout() { location.reload(); }
    </script>
</body>
</html>
