<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin - Mining Farm</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FF; 
            --bg: radial-gradient(circle at top, #0a1a2e 0%, #000000 100%);
            --card: rgba(15, 15, 30, 0.85);
            --t: #fff; --g: #00ff88; --r: #ff4444; 
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; }

        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 30px; }

        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; text-align: center; }
        .view.on { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 9px; border-bottom: 1px solid rgba(7, 255, 255, 0.1); }
        .stat-val { display: block; color: var(--p); font-size: 12px; margin-top: 4px; }

        input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(0,0,0,0.4); border: 1px solid #222; color: #fff; border-radius: 12px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: bold; background: var(--p); color: #000; cursor: pointer; transition: 0.2s; }

        .m-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--g); background: none; color: var(--g); font-size: 24px; margin: 40px auto; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 40px rgba(255,68,68,0.3); }

        nav { display: flex; background: rgba(0,0,0,0.9); border-top: 1px solid #111; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 10px; color: #444; cursor: pointer; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }

        .card { padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box glass">
            <h2 style="letter-spacing: 5px;">STICK <span style="color:var(--p)">FARM</span></h2>
            <input type="text" id="u" placeholder="ЛОГІН">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="abtn">УВІЙТИ</button>
            <p id="tlink" style="margin-top:20px; font-size:11px; color:#555; cursor:pointer;">РЕЄСТРАЦІЯ НОВОЇ ФЕРМИ</p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div>БАЛАНС<span id="stat-bal" class="stat-val">0.00</span></div>
            <div>АКТИВНІ ПР.<span id="active-nodes" class="stat-val">0</span></div>
            <div>ШВИДКІСТЬ<span id="stat-speed" class="stat-val">1x</span></div>
        </div>

        <div id="v-mine" class="view on">
            <h1 id="bal" style="font-size:3.2rem; margin: 35px 0; text-shadow: 0 0 15px var(--p);">0.00000</h1>
            <button id="mbtn" class="m-btn">START</button>
            <p id="m-status" style="color:var(--g); font-size:11px; margin-top:10px;">READY TO EXTRACT</p>
        </div>

        <div id="v-social" class="view">
            <h3>GLOBAL TOP</h3>
            <div id="friends-list"></div>
        </div>

        <div id="v-profile" class="view">
            <h3>SETTINGS</h3>
            <div class="glass card"><span>NODE_ID:</span> <span id="prof-id" style="color:var(--p)">---</span></div>
            <button onclick="logout()" style="background:var(--r); margin-top: 40px;">STOP ALL & EXIT</button>
        </div>

        <nav>
            <div class="tab on" id="t-mine">MINING</div>
            <div class="tab" id="t-social">SOCIAL</div>
            <div class="tab" id="t-profile">FARM</div>
        </nav>
    </div>

    <script>

            document.getElementById('tlink').onclick = () => {
                isReg = !isReg;
                document.querySelector('#auth-screen h2').innerText = isReg ? "REGISTRY" : "STICK FARM";
                document.getElementById('abtn').innerText = isReg ? "CREATE" : "CONNECT";
            };

                const u = document.getElementById('u').value.trim().toLowerCase();
                const p = document.getElementById('p').value.trim();
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, { headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"} });
                db = await res.json();
                
                if(isReg) {
                    if(db.users[u]) return alert("Зайнято!");
                    db.users[u] = { password: p, balance: 0.0, active_nodes: 0 };
                    await sync(); location.reload();
                } else if(db.users[u] && db.users[u].password == p) {
                    cur = u; cloud = db.users[u].balance;
                    document.getElementById('prof-id').innerText = u;
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    
                    // Перевіряємо, чи був майнінг активний на цьому пристрої
                    if(localStorage.getItem('mine_on_' + cur) === 'true') {
                        startMining();
                    }
                    upd();
                    setInterval(autoSync, 30000); // Авто-синхронізація кожні 30 сек
                } else alert("Error!");
            };
