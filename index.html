<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Fix</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #121212; padding: 30px; border-radius: 20px; border: 1px solid #222; width: 90%; max-width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #07FF; border: none; border-radius: 10px; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #msg { color: #07FF; font-size: 12px; margin-top: 10px; min-height: 15px; }
        #app { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h1 style="margin-top:0">STICK COIN</h1>
        <input type="text" id="u" placeholder="Логін">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="handleLogin()">УВІЙТИ</button>
        <div id="msg"></div>
    </div>

    <div id="app">
        <h1>Вітаємо!</h1>
        <p>Ви увійшли в систему.</p>
    </div>

    <script>
        // Твої ключі
        const BID = "6a04f5aaadc21f119a979f14";
        const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";

        // Робимо функцію глобальною, щоб кнопка її точно побачила
        window.handleLogin = async function() {
            const userField = document.getElementById('u');
            const passField = document.getElementById('p');
            const msg = document.getElementById('msg');

            const u = userField.value.trim();
            const p = passField.value.trim();

            if (!u || !p) {
                alert("Введи логін та пароль!");
                return;
            }

            msg.innerText = "⏳ Підключення до бази...";

            try {
                const url = "https://api.jsonbin.io/v3/b/" + BID + "/latest";
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        "X-Master-Key": KEY,
                        "X-Bin-Meta": "false"
                    }
                });

                if (!response.ok) {
                    throw new Error("Сервер відповів помилкою: " + response.status);
                }

                const data = await response.json();
                const db = data.record || data;

                if (db.users && db.users[u] && String(db.users[u].password) === String(p)) {
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    alert("Вхід успішний!");
                } else {
                    msg.innerText = "❌ Невірний логін або пароль";
                    alert("Помилка: перевір дані в JSONBin!");
                }

            } catch (err) {
                console.error(err);
                msg.innerText = "⚠️ Помилка зв'язку";
                alert("Діагностика: " + err.message);
            }
        };
    </script>
</body>
</html>
