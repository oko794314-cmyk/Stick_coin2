<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin OS | Ultimate</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #121212; --t: #fff; --g: #00ff88; --r: #ff4444; }
        body { background: var(--bg); color: var(--t); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Екран входу */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; transition: 0.5s; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 30px; background: var(--card); border-radius: 24px; border: 1px solid #222; box-shadow: 0 0 20px rgba(7,255,255,0.1); }
        
        /* Додаток */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; animation: slide 0.3s ease; }
        .view.on { display: block; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Елементи */
        .card { background: var(--card); padding: 18px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--p); }
        button { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-p { background: var(--p); color: #000; }
        .btn-g { background: var(--g); color: #000; }

        /* Майнінг */
        .m-btn { width: 180px; height: 180px; border-radius: 50%; border: 6px solid var(--g); background: none; color: var(--g); font-size: 22px; margin: 30px auto; display: block; font-weight: 900; }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 20px rgba(255,68,68,0.2); }

        /* Навігація */
        nav { display: flex; background: #080808; border-top: 1px solid #181818; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 10px; color: #444; cursor: pointer; transition: 0.3s; }
        .tab.on { color: var(--p); }
        
        .top-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #181818; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h1 style="letter-spacing:2px">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button class="btn-p" onclick="login()">LOG IN</button>
            <p id="msg" style="color:var(--r); font-size:12px; margin-top:15px"></p>
        </div>
    </div>

    <div id="app">
        <div style="padding:15px; text-align:center; font-size:12px; font-weight:bold; border-bottom:1px solid #111; letter-spacing:1px">
            NODE: <span id="user-tag" style="color:var(--p)"></span>
        </div>

        <!-- МАЙНІНГ -->
        <div class="view on" id="v-mine">
            <div style="text-align:center; margin-top:20px">
                <h1 id="bal" style="font-size:3.5rem; margin:10px 0; font-family:monospace; text-shadow: 0 0 15px rgba(7,255,255,0.2)">0.00000</h1>
                <button id="m-btn" class="m-btn" onclick="toggleM()">START</button>
                <p id="status" style="font-size:11px; color:#444">STABLE CONNECTION</p>
            </div>
        </div>

        <!-- ТОП -->
        <div class="view" id="v-top">
            <h3 style="color:var(--p)">RANKING</h3>
            <div class="card" id="top-list">Завантаження...</div>
        </div>

        <!-- ТРАНЗАКЦІЇ -->
        <div class="view" id="v-tx">
            <h3 style="color:var(--g)">TRANSFER</h3>
            <div class="card">
                <input type="text" id="tx-to" placeholder="Отримувач (@name)">
                <input type="number" id="tx-amt" placeholder="Сума монет">
                <button class="btn-g" onclick="sendSTK()">SEND STICK COIN</button>
            </div>
            <p style="font-size:11px; color:#555; text-align:center">Комісія мережі: 0.00%</p>
        </div>

        <!-- ІНШЕ -->
        <div class="view" id="v-else">
            <h3 style="color:var(--p)">SYSTEM INFO</h3>
            <div class="card">
                <p style="margin:5px 0; font-size:14px"><b>Версія:</b> 2.5 Pro</p>
                <p style="margin:5px 0; font-size:14px"><b>База:</b> JSONBin Cloud</p>
            </div>
            <div class="card">
                <p style="color:var(--p); margin:0" onclick="window.open('https://github.com/')">GitHub Source ↗</p>
            </div>
            <button style="background:#222; color:var(--r)" onclick="location.reload()">LOGOUT</button>
        </div>

        <nav>
            <div class="tab on" onclick="tab('mine', this)">MINE</div>
            <div class="tab" onclick="tab('top', this)">TOP</div>
            <div class="tab" onclick="tab('tx', this)">SEND</div>
            <div class="tab" onclick="tab('else', this)">ELSE</div>
        </nav>
    </div>
