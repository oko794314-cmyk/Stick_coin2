<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Hub</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #ffffff; --nav: #1a1a1a; --green: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 450px; background: var(--card); position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        
        /* Екран входу */
        #auth-screen { padding: 40px 20px; text-align: center; height: 100%; justify-content: center; display: flex; flex-direction: column; }
        
        /* Контент */
        .content-area { flex-grow: 1; padding: 25px 20px; overflow-y: auto; padding-bottom: 90px; }
        .page { display: none; text-align: center; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        h1, h2 { color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px; }
        .balance-label { color: #7BEF; font-size: 0.8em; margin-top: 20px; }
        .balance { font-size: 3em; font-family: 'Courier New', monospace; font-weight: bold; margin: 10px 0; text-shadow: 0 0 15px rgba(7, 255, 255, 0.3); }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 14px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; transition: 0.2s; color: black; text-transform: uppercase; }
        .btn:active { transform: scale(0.96); }
        .btn-mine { background: var(--green); margin: 20px 0; font-size: 1.2em; box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }
        .btn-mine.active { background: #ff4444; animation: pulse 1.5s infinite; }

        /* Навігація */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 75px; background: var(--nav); display: flex; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #666; font-size: 0.7em; transition: 0.3s; }
        .nav-item.active { color: var(--accent); background: rgba(7, 255, 255, 0.05); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        /* Списки */
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--accent); }
        .list-item span { font-size: 0.9em; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <!-- ВХІД -->
        <div id="auth-screen">
            <h1>STICK COIN</h1>
            <p style="color: #555; font-size: 0.8em;">Система хмарного майнінгу</p>
            <input type="text" id="userIn" placeholder="Логін">
            <input type="password" id="passIn" placeholder="Пароль">
            <button class="btn" onclick="login()" id="loginBtn">УВІЙТИ</button>
            <p id="err" style="color: #ff4444; font-size: 0.8em; margin-top: 10px;"></p>
        </div>

        <!-- ГОЛОВНЕ МЕНЮ -->
        <div id="main-ui" style="display: none; height: 100%;">
            <div class="content-area">
                
                <!-- МАЙНІНГ -->
                <div id="page-mine" class="page active">
                    <h2>STICK COIN</h2>
                    <div class="balance-label">БАЛАНС ГАМАНЦЯ</div>
                    <div class="balance" id="bal">0.00000</div>
                    
                    <button id="mineBtn" class="btn btn-mine" onclick="toggleMining()">ПОЧАТИ МАЙНІНГ</button>
                    
                    <div style="background: #111; padding: 15px; border-radius: 10px; font-size: 0.8em;">
                        <p id="status-text">Статус: Очікування</p>
                        <p id="session-earn">За сесію: +0.00000</p>
                    </div>
                </div>

                <!-- ДРУЗІ -->
                <div id="page-friends" class="page">
                    <h2>СПИСОК ДРУЗІВ</h2>
                    <div id="friends-list">
                        <div class="list-item"><span>Користувач 1</span><span style="color:var(--green)">Online</span></div>
                        <div class="list-item"><span>Користувач 2</span><span style="color:#555">Offline</span></div>
                    </div>
                    <button class="btn" style="background:none; border:1px solid #444; color:#777; margin-top:20px;">ДОДАТИ ДРУГА</button>
                </div>

                <!-- ТРАНЗАКЦІЇ -->
                <div id="page-trans" class="page">
                    <h2>ТРАНЗАКЦІЇ</h2>
                    <div id="trans-list">
                        <div class="list-item"><span>Система (Cloud)</span><span style="color:var(--green)">+0.00540</span></div>
                        <div class="list-item"><span>Синхронізація</span><span style="color:var(--accent)">Success</span></div>
                    </div>
                </div>

            </div>

            <!-- ТАБ-БАР -->
            <div class="nav-bar">
                <div class="nav-item" onclick="switchTab('friends', this)">
                    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span>Друзі</span>
                </div>
                <div class="nav-item active" onclick="switchTab('mine', this)">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                    <span>Майнінг</span>
                </div>
                <div class="nav-item" onclick="switchTab('trans', this)">
                    <svg viewBox="0 0 24 24"><path d="M11.8 2.1L6.6 7.3l1.4 1.4L11 5.8V19h2V5.8l3 3 1.4-1.4L12.2 2.1z"/></svg>
                    <span>Перекази</span>
                </div>
            </div>
        </div>
    </div>

<script>
