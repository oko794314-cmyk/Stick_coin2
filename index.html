<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin OS v2.0</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #121212; --t: #fff; --g: #00ff88; --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Авторизація */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 340px; text-align: center; padding: 30px; background: var(--card); border-radius: 28px; border: 1px solid #222; }
        
        /* Додаток */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; text-align: center; }
        .view.on { display: block; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 14px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--p); }
        button { width: 100%; padding: 15px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; background: var(--p); color: #000; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        
        /* Майнінг */
        .m-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--g); background: none; color: var(--g); font-size: 24px; margin: 30px auto; font-weight: 900; box-shadow: 0 0 20px rgba(0,255,136,0.1); }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 20px rgba(255,68,68,0.2); }
        
        /* Навігація */
        nav { display: flex; background: #0a0a0a; border-top: 1px solid #1a1a1a; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 11px; color: #555; cursor: pointer; font-weight: bold; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }
        
        .card { background: var(--card); padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid #222; text-align: left; }
        .bal-val { font-size: 3.5rem; margin: 15px 0; font-family: monospace; letter-spacing: -2px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h1 id="atitle">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button id="abtn">УВІЙТИ</button>
            <div id="tlink" style="margin-top:20px; font-size:12px; color:#555; cursor:pointer;">Створити новий акаунт</div>
            <div id="amsg" style="margin-top:15px; font-size:11px; color:var(--p); min-height:1em;"></div>
        </div>
    </div>

    <div id="app">
        <div style="padding:10px; text-align:center; font-size:10px; color:#444; border-bottom:1px solid #111;">
            NETWORK: ONLINE | USER: <span id="utag" style="color:var(--p)">---</span>
        </div>

        <div class="view on" id="v-mine">
            <div class="bal-val" id="bal">0.00000</div>
            <button id="mbtn" class="m-btn">START</button>
            <p id="m-status" style="color:#444; font-size:12px; font-weight:bold;">SYSTEM READY</p>
        </div>

        <div class="view" id="v-top">
            <h2 style="margin-bottom:20px;">TOP HOLDERS</h2>
            <div id="top-list"></div>
        </div>

        <div class="view" id="v-tx">
            <h2 style="margin-bottom:20px;">TRANSFER</h2>
            <div class="card">
                <input type="text" id="tx-to" placeholder="Логін отримувача">
                <input type="number" id="tx-amt" placeholder="Кількість STK">
                <button id="tx-btn" style="background:var(--g); margin-top:10px;">SEND COINS</button>
            </div>
            <p style="font-size:11px; color:#444;">Комісія мережі: 0%</p>
        </div>

        <nav>
            <div class="tab on" id="tab-mine">MINE</div>
            <div class="tab" id="tab-top">TOP</div>
            <div class="tab" id="tab-tx">SEND</div>
            <div class="tab" id="exit-btn" style="color:var(--r)">EXIT</div>
        </nav>
    </div>

    <script>
        const BID = "6a04f5aaadc21f119a979f14";
        const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
        let db, cur, cloud = 0, loc = 0, isM = false, isReg = false;

        // Вхід та Реєстрація
        document.getElementById('tlink').onclick = function() {
            isReg = !isReg;
            document.getElementById('atitle').innerHTML = isReg ? "NEW <span style='color:var(--p)'>USER</span>" : "STICK<span style='color:var(--p)'>COIN</span>";
            document.getElementById('abtn').innerText = isReg ? "ЗАРЕЄСТРУВАТИСЯ" : "УВІЙТИ";
            this.innerText = isReg ? "Вже є акаунт? Увійти" : "Створити новий акаунт";
        };

            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            const msg = document.getElementById('amsg');
            if (!u || !p) return alert("Заповни всі поля!");

            msg.innerText = "⏳ ПІДКЛЮЧЕННЯ...";
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest?cache=${Math.random()}`, {
                    headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" }
                });
                db = await res.json();

                if (isReg) {
                    if (db.users[u]) return alert("Логін вже зайнятий!");
                    db.users[u] = { password: p, balance: 1.0 };
                    await sync();
                    alert("Акаунт створено! Увійдіть.");
                    location.reload();
                } else {
                    if (db.users && db.users[u] && String(db.users[u].password) === String(p)) {
                        cur = u;
                        cloud = db.users[u].balance || 0;
                        document.getElementById('utag').innerText = u.toUpperCase();
                        document.getElementById('auth-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        updateUI();
                    } else alert("Невірний логін або пароль!");
                }
            } catch (e) { alert("Помилка мережі: " + e.message); }
            msg.innerText = "";
        };
