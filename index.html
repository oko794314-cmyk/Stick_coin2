<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin OS</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #121212; --t: #fff; --g: #00ff88; --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Екран входу */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 30px; background: var(--card); border-radius: 24px; border: 1px solid #222; }
        
        /* Головний інтерфейс */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .view.on { display: block; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--p); color: #000; }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }
        
        /* Майнінг */
        .m-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--g); background: none; color: var(--g); font-size: 24px; margin: 40px auto; display: block; font-weight: 900; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 20px rgba(255,68,68,0.2); }
        
        /* Навігація */
        nav { display: flex; background: #080808; border-top: 1px solid #181818; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 11px; color: #444; cursor: pointer; font-weight: bold; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }
        
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #222; }
        .bal-display { font-size: 3.5rem; margin: 20px 0; font-family: monospace; color: var(--t); }
    </style>
</head>
<body>

    <!-- Екран авторизації -->
    <div id="auth-screen">
        <div class="box">
            <h1 id="atitle">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button id="abtn" class="btn-main">УВІЙТИ</button>
            <div id="tlink" style="margin-top:20px; font-size:13px; color:#666; cursor:pointer;">Створити новий акаунт</div>
        </div>
    </div>

    <!-- Основна програма -->
    <div id="app">
        <div style="padding:15px; text-align:center; font-size:12px; border-bottom: 1px solid #111;">
            LOGGED AS: <span id="utag" style="color:var(--p); font-weight:bold;">---</span>
        </div>

        <!-- Вкладка Майнінг -->
        <div class="view on" id="v-mine">
            <div style="text-align:center;">
                <div class="bal-display" id="bal">0.00000</div>
                <button id="m-btn" class="m-btn">START</button>
                <p id="m-status" style="color:#555; letter-spacing: 1px;">SYSTEM READY</p>
            </div>
        </div>

        <!-- Вкладка Топ -->
        <div class="view" id="v-top">
            <h2 style="text-align:center;">TOP HOLDERS</h2>
            <div id="top-list"></div>
        </div>

        <!-- Вкладка Перекази -->
        <div class="view" id="v-tx">
            <h2 style="text-align:center;">SEND COINS</h2>
            <div class="card">
                <p style="font-size:12px; color:#666;">Адреса отримувача (логін):</p>
                <input type="text" id="tx-to" placeholder="Введіть логін">
                <p style="font-size:12px; color:#666; margin-top:10px;">Кількість Stick Coins:</p>
                <input type="number" id="tx-amt" placeholder="0.00">
                <button id="sendBtn" style="background:var(--g); color:#000; margin-top:10px;">CONFIRM TRANSFER</button>
            </div>
        </div>

        <!-- Нижнє меню -->
        <nav>
            <div class="tab on" data-v="mine">MINE</div>
            <div class="tab" data-v="top">TOP</div>
            <div class="tab" data-v="tx">SEND</div>
            <div class="tab" id="exitBtn" style="color:var(--r)">EXIT</div>
        </nav>
    </div>
