<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Fix</title>
    <style>
        :root { --p: #07FF; --bg: #000; --c: #111; --t: #fff; }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 80%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; }
        button { width: 85%; padding: 12px; background: var(--p); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: var(--c); padding: 15px; border-radius: 12px; margin: 10px auto; max-width: 300px; border: 1px solid #333; }
        #app { display: none; }
    </style>
</head>
<body>

    <div id="auth">
        <h1>STICK<span style="color:var(--p)">COIN</span></h1>
        <div class="card">
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button onclick="login()">УВІЙТИ</button>
            <p id="err" style="color:red; font-size:12px"></p>
        </div>
    </div>

    <div id="app">
        <p>БАЛАНС</p>
        <h1 id="bal" style="color:var(--p); font-size:3rem">0.00000</h1>
        <button id="m-btn" style="background:#00ff88" onclick="mine()">МАЙНИТИ</button>
        <div class="card" id="top"></div>
        <button style="background:red; margin-top:20px" onclick="location.reload()">ВИХІД</button>
    </div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let db, cur, cloud = 0, loc = 0;

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const err = document.getElementById('err');
        err.innerText = "⏳ Завантаження...";

        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"}
            });
            
            if (!r.ok) throw new Error("Помилка ключа або ID");
            
            db = await r.json();
            // Перевірка на record (іноді JSONBin додає цю обгортку)
            let data = db.record ? db.record : db;

            if (data.users[u] && String(data.users[u].password) === String(p)) {
                cur = u;
                cloud = data.users[u].balance || 0;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('bal').innerText = cloud.toFixed(5);
            } else {
                err.innerText = "❌ Невірний логін або пароль";
            }
        } catch (e) {
            err.innerText = "⚠️ Помилка з'єднання: " + e.message;
            console.error(e);
        }
    }

    function mine() {
        loc += 0.0001;
        document.getElementById('bal').innerText = (cloud + loc).toFixed(5);
    }
</script>
</body>
</html>
