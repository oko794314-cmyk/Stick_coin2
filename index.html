<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Pro</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #fff; --green: #00ff88; --red: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; }
        .container { width: 100%; max-width: 450px; height: 100vh; margin: auto; background: var(--card); position: relative; display: flex; flex-direction: column; }
        .screen { display: none; height: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .active-screen { display: flex; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-main { background: var(--accent); color: #000; }
        .page { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }
        .balance-big { font-size: 3.5em; font-family: monospace; color: var(--accent); margin: 20px 0; text-align: center; }
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .nav { position: absolute; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 0.8em; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--accent); background: #1a1a1a; }
        #debug { font-size: 0.7em; color: #ff4444; text-align: center; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen" class="screen active-screen">
        <h1 style="text-align:center"><span style="color:var(--accent); cursor:pointer" onclick="fill()">STICK</span> COIN</h1>
        <input type="text" id="u" placeholder="Логін">
        <input type="password" id="p" placeholder="Пароль">
        <button class="btn btn-main" onclick="doLogin()">УВІЙТИ</button>
        <div id="debug"></div>
    </div>

    <div id="main-ui" class="screen">
        <div id="p-mine" class="page active">
            <h2 style="text-align:center">МАЙНІНГ</h2>
            <div class="balance-big" id="bal">0.00000</div>
            <button id="mBtn" class="btn" style="background:var(--green)" onclick="toggleM()">ПОЧАТИ</button>
            <p id="st-text" style="color:#666; text-align:center">Готовий</p>
        </div>

        <div id="p-friends" class="page">
            <h2>ДРУЗІ</h2>
            <input type="text" id="fName" placeholder="Логін друга">
            <button class="btn btn-main" onclick="addF()">Надіслати запит</button>
            <div id="req-list"></div>
            <div id="f-list"></div>
        </div>

        <div id="p-info" class="page">
            <h2>ПРО АКАУНТ</h2>
            <div class="list-item">Логін: <b id="i-u"></b></div>
            <div class="list-item">Баланс: <b id="i-b"></b></div>
            <button class="btn" style="background:var(--red); color:#fff; margin-top:20px" onclick="location.reload()">ВИЙТИ</button>
        </div>

        <div class="nav">
            <div class="nav-item" onclick="tab('friends', this)">Друзі</div>
            <div class="nav-item active" id="def-nav" onclick="tab('mine', this)">Майнінг</div>
            <div class="nav-item" onclick="tab('info', this)">Інфо</div>
        </div>
    </div>
</div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";

    function fill() {
        document.getElementById('u').value = "Svat_ferm";
        document.getElementById('p').value = "17092012";
        console.log("Fill triggered");
    }

    async function doLogin() {
        const uIn = document.getElementById('u').value.trim();
        const pIn = document.getElementById('p').value.trim();
        const dbg = document.getElementById('debug');
        
        dbg.style.color = "var(--accent)";
        dbg.innerText = "⏳ Підключення...";

        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"}
            });
            const res = await r.json();
            data = res.record ? res.record : res;
            
            if(!data.users) data.users = {};

            if(data.users[uIn] && String(data.users[uIn].password) === String(pIn)) {
                user = uIn;
                cloud = data.users[uIn].balance || 0;
                
                // Перевірка полів
                if(!data.users[uIn].friends) data.users[uIn].friends = [];
                if(!data.users[uIn].requests) data.users[uIn].requests = [];
                
                document.getElementById('auth-screen').classList.remove('active-screen');
                document.getElementById('main-ui').classList.add('active-screen');
                upd();
                loadF();
            } else {
                dbg.style.color = "var(--red)";
                dbg.innerText = "❌ Невірні дані. В базі: " + Object.keys(data.users).join(", ");
            }
        } catch(e) {
            dbg.style.color = "var(--red)";
            dbg.innerText = "⚠️ Помилка: " + e.message;
        }
    }

    function tab(name, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('p-'+name).classList.add('active');
        el.classList.add('active');
        if(name === 'info') {
            document.getElementById('i-u').innerText = user;
            document.getElementById('i-b').innerText = (cloud + loc).toFixed(5);
        }
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('mBtn');
        if(isM) { b.innerText = "ЗУПИНИТИ"; b.style.background = "var(--red)"; loop(); }
        else { b.innerText = "ПОЧАТИ"; b.style.background = "var(--green)"; sync(); }
    }

    function loop() { if(isM) { loc += 0.00001; upd(); setTimeout(loop, 1000); } }
    function upd() { document.getElementById('bal').innerText = (cloud + loc).toFixed(5); }

        document.getElementById('st-text').innerText = "⏳ Збереження...";
