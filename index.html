<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin FIX</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .screen { display: none; padding: 20px; }
        .on { display: block; }
        input { display: block; width: 80%; margin: 10px auto; padding: 10px; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; }
        button { padding: 10px 20px; background: #07FF; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #bal { font-size: 3rem; margin: 20px 0; font-family: monospace; }
        .m-btn { width: 150px; height: 150px; border-radius: 50%; border: 5px solid #0f8; background: none; color: #0f8; font-size: 20px; cursor: pointer; }
        .active { border-color: #f44; color: #f44; }
    </style>
</head>
<body>

    <!-- Екран входу -->
    <div id="auth" class="screen on">
        <h1>STICK COIN</h1>
        <input type="text" id="u" placeholder="Логін">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="login()">УВІЙТИ</button>
        <p id="msg" style="color: red;"></p>
    </div>

    <!-- Екран майнінгу -->
    <div id="app" class="screen">
        <p>USER: <span id="tag" style="color:#07FF"></span></p>
        <h1 id="bal">0.00000</h1>
        <button id="m-btn" class="m-btn" onclick="toggleM()">START</button>
        <br><br>
        <button style="background:#333; color:#fff" onclick="location.reload()">LOGOUT</button>
    </div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let db, cur, cloud = 0, loc = 0, isM = false;

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const msg = document.getElementById('msg');
        
        // Перевірка debug входу
        if (u === "debug" && p === "111") {
            startApp("DEBUG", 0);
            return;
        }

        msg.innerText = "Завантаження...";
        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"}
            });
            const data = await r.json();
            db = data.record || data;

            if (db.users && db.users[u] && String(db.users[u].password) === String(p)) {
                startApp(u, db.users[u].balance || 0);
            } else {
                msg.innerText = "Помилка входу";
            }
        } catch (e) {
            msg.innerText = "Помилка мережі: " + e.message;
        }
    }

    function startApp(user, balance) {
        cur = user;
        cloud = balance;
        document.getElementById('tag').innerText = user;
        document.getElementById('auth').classList.remove('on');
        document.getElementById('app').classList.add('on');
        upd();
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('m-btn');
        b.innerText = isM ? "STOP" : "START";
        b.classList.toggle('active', isM);
        if(isM) loop(); else sync();
    }

    function loop() {
        if(isM) {
            loc += 0.00005;
            upd();
            setTimeout(loop, 1000);
        }
    }

    function upd() {
        document.getElementById('bal').innerText = (cloud + loc).toFixed(5);
    }

    async function sync() {
        if (cur === "DEBUG") return;
        db.users[cur].balance += loc;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BID}`, {
                method: "PUT",
                headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                body: JSON.stringify(db)
            });
            cloud += loc;
            loc = 0;
        } catch(e) { console.error("Sync error"); }
    }
</script>
</body>
</html>
