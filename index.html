<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin</title>
    <style>
        :root { --p: #07FF; --bg: #000; --c: #111; --t: #fff; }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; margin: 0; }
        
        /* Екран входу */
        #auth { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
        .auth-box { width: 100%; max-width: 300px; text-align: center; }
        
        /* Головний інтерфейс */
        #app { display: none; height: 100vh; flex-direction: column; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .page { display: none; }
        .active { display: block; }
        
        /* Елементи */
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-p { background: var(--p); color: #000; }
        
        /* Навігація */
        nav { display: flex; background: #0a0a0a; border-top: 1px solid #222; }
        .n-btn { flex: 1; padding: 20px; text-align: center; font-size: 0.8rem; color: #555; cursor: pointer; }
        .n-btn.on { color: var(--p); }

        /* Чат */
        .msg-area { height: 150px; background: #0a0a0a; border-radius: 8px; padding: 10px; overflow-y: auto; margin: 10px 0; border: 1px solid #222; font-size: 0.85rem; }
        .item { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- ВХІД -->
    <div id="auth">
        <div class="auth-box">
            <h1 onclick="autoFill()" style="cursor:pointer">STICK <span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button class="btn btn-p" onclick="login()">УВІЙТИ</button>
            <p id="err" style="color:red; font-size: 0.8rem;"></p>
        </div>
    </div>

    <!-- ДОДАТОК -->
    <div id="app">
        <div class="content">
            <!-- Майнінг -->
            <div id="p-mine" class="page active">
                <div style="text-align:center; margin-top:50px">
                    <p style="color:#666">БАЛАНС</p>
                    <h1 id="v-bal" style="font-size:3rem; margin:10px 0">0.00000</h1>
                    <button id="m-btn" class="btn" style="background:#00ff88; border-radius:30px; width:150px" onclick="toggleM()">СТАРТ</button>
                    <p id="st" style="font-size:0.7rem; color:#444; margin-top:10px">Майнер зупинено</p>
                </div>
            </div>

            <!-- Друзі -->
            <div id="p-friends" class="page">
                <h3>ДРУЗІ ТА ЧАТИ</h3>
                <div class="item">
                    <input type="text" id="find-u" placeholder="Логін друга">
                    <button class="btn btn-p" onclick="addF()">Додати</button>
                </div>
                <div id="req-list"></div>
                <div id="friend-list"></div>
            </div>

            <!-- Інше -->
            <div id="p-more" class="page">
                <h3>АКАУНТ</h3>
                <div class="item">Юзер: <b id="i-u"></b></div>
                <div class="item">Баланс: <b id="i-b"></b></div>
                <div class="item">Друзів: <b id="i-f"></b></div>
                <button class="btn" style="background:red; color:#fff" onclick="location.reload()">ВИЙТИ</button>
            </div>
        </div>

        <nav>
            <div class="n-btn" onclick="tab('friends', this)">ДРУЗІ</div>
            <div class="n-btn on" onclick="tab('mine', this)">МАЙНІНГ</div>
            <div class="n-btn" onclick="tab('more', this)">ІНШЕ</div>
        </nav>
    </div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let cur = null, isM = false, loc = 0, cloud = 0, db = null;

    function autoFill() {
        document.getElementById('u').value = "Svat_ferm";
        document.getElementById('p').value = "17092012";
    }

    async function login() {
        const uIn = document.getElementById('u').value.trim();
        const pIn = document.getElementById('p').value.trim();
        const err = document.getElementById('err');
        err.innerText = "⏳ Завантаження...";

        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {headers:{"X-Master-Key":KEY, "X-Bin-Meta":"false"}});
            const res = await r.json();
            db = res.record ? res.record : res;

            if(db.users[uIn] && String(db.users[uIn].password) === String(pIn)) {
                cur = uIn;
                cloud = db.users[uIn].balance || 0;
                
                // Перевірка полів
                if(!db.users[cur].friends) db.users[cur].friends = [];
                if(!db.users[cur].requests) db.users[cur].requests = [];
                if(!db.chats) db.chats = {};

                document.getElementById('auth').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                upd();
                renderF();
            } else { err.innerText = "❌ Помилка входу"; }
        } catch(e) { err.innerText = "⚠️ Сервер не відповідає"; }
    }

    function tab(name, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('on'));
        document.getElementById('p-'+name).classList.add('active');
        el.classList.add('on');
        if(name === 'more') {
            document.getElementById('i-u').innerText = cur;
            document.getElementById('i-b').innerText = (cloud + loc).toFixed(5);
            document.getElementById('i-f').innerText = db.users[cur].friends.length;
        }
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('m-btn');
        if(isM) { b.innerText = "ПАУЗА"; b.style.background = "red"; tick(); }
        else { b.innerText = "СТАРТ"; b.style.background = "#00ff88"; sync(); }
    }

    function tick() { if(isM) { loc += 0.00001; upd(); setTimeout(tick, 1000); } }
    function upd() { document.getElementById('v-bal').innerText = (cloud + loc).toFixed(5); }

    async function sync() {
        document.getElementById('st').innerText = "⏳ Збереження...";
        db.users[cur].balance += loc;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BID}`, {
                method: "PUT", headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                body: JSON.strin
