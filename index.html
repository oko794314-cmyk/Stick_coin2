<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Stick Coin Fix</title>
    <style>
        body { background: #000; color: #07FF; font-family: sans-serif; text-align: center; padding-top: 100px; }
        input { display: block; margin: 10px auto; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; width: 250px; }
        button { padding: 15px 40px; background: #07FF; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; font-size: 14px; color: #555; }
    </style>
</head>
<body>
    <h1>LOGIN TO SYSTEM</h1>
    <input type="text" id="user" placeholder="Логін">
    <input type="password" id="pass" placeholder="Пароль">
    <button id="go">УВІЙТИ</button>
    <div id="status">Введіть дані</div>

    <script>
        document.getElementById('go').onclick = async () => {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            const s = document.getElementById('status');
            
            s.innerText = "З'єднання...";
            
            try {
                // Додаємо ?nocache=... щоб обійти кешування браузера
                const url = "https://api.jsonbin.io/v3/b/6a04f5aaadc21f119a979f14/latest?nocache=" + Math.random();
                const res = await fetch(url, {
                    headers: { 
                        "X-Master-Key": "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea",
                        "X-Bin-Meta": "false"
                    }
                });

                if (!res.ok) throw new Error("Помилка ключа (401)");
                const db = await res.json();
                
                if (db.users[u] && String(db.users[u].password) === String(p)) {
                    s.style.color = "#0f8";
                    s.innerText = "УСПІХ! ПЕРЕНАПРАВЛЕННЯ...";
                    alert("Ти увійшов! Тепер можеш ставити повний код гри.");
                } else {
                    s.style.color = "red";
                    s.innerText = "Помилка: логін або пароль невірні";
                }
            } catch (e) {
                s.style.color = "red";
                s.innerText = "Критична помилка: " + e.message;
            }
        };
    </script>
</body>
</html>
