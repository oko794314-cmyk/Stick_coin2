<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin OS v5.0</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #121212; --t: #fff; --g: #00ff88; --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--t); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Екран входу */
        #auth-screen { 
            position: fixed; 
            inset: 0; 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
        }
        .box { 
            width: 85%; 
            max-width: 320px; 
            text-align: center; 
            padding: 30px; 
            background: var(--card); 
            border-radius: 24px; 
            border: 1px solid #222; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Основний додаток */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .view.on { display: block; }

        /* Елементи керування */
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 10px 0; 
            background: #000; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 12px; 
            outline: none; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 14px; 
            font-weight: bold; 
            cursor: pointer; 
            background: var(--p); 
            color: #000; 
            transition: 0.2s;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }

        /* Майнінг */
        .m-btn { 
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            border: 8px solid var(--g); 
            background: none; 
            color: var(--g); 
            font-size: 24px; 
            margin: 40px auto; 
            display: block; 
            font-weight: 900;
            box-shadow: 0 0 20px rgba(0,255,136,0.1);
        }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 20px rgba(255,68,68,0.2); }

        /* Навігація */
        nav { 
            display: flex; 
            background: #080808; 
            border-top: 1px solid #181818; 
            padding-bottom: env(safe-area-inset-bottom); 
        }
        .tab { 
            flex: 1; 
            padding: 18px 0; 
            text-align: center; 
            font-size: 11px; 
            color: #444; 
            cursor: pointer; 
            font-weight: bold; 
        }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }

        /* Картки */
        .card { 
            background: var(--card); 
            padding: 15px; 
            border-radius: 18px; 
            margin-bottom: 12px; 
            border: 1px solid #222; 
        }
        .bal-display { font-size: 3.5rem; margin: 20px 0; font-family: monospace; }
        #amsg { margin-top: 15px; font-size: 12px; color: var(--p); min-height: 1.2em; }
    </style>
</head>
<body>

    <!-- Екран авторизації -->
    <div id="auth-screen">
        <div class="box">
            <h1 id="atitle">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button id="abtn">УВІЙТИ</button>
            <div id="amsg"></div>
            <div id="tlink" style="margin-top:20px; font-size:12px; color:#555; text-decoration:underline; cursor:pointer;">Створити новий акаунт</div>
        </div>
    </div>

    <!-- Основний додаток -->
    <div id="app">
        <div style="padding:10px; text-align:center; font-size:10px; color:#444; border-bottom:1px solid #111;">
            USER: <span id="utag" style="color:var(--p)">---</span>
        </div>

        <!-- Вкладка Майнінг -->
        <div class="view on" id="v-mine">
            <div style="text-align:center;">
                <div class="bal-display" id="bal">0.00000</div>
                <button id="m-btn" class="m-btn">START</button>
                <p id="m-status" style="color:#444; font-size: 12px; letter-spacing: 1px;">READY TO MINE</p>
            </div>
        </div>

        <!-- Вкладка ТОП -->
        <div class="view" id="v-top">
            <h2 style="text-align:center; margin-bottom:20px;">TOP HOLDERS</h2>
            <div id="top-list"></div>
        </div>

        <!-- Вкладка Перекази -->
        <div class="view" id="v-tx">
            <h2 style="text-align:center; margin-bottom:20px;">SEND STK</h2>
            <div class="card">
                <input type="text" id="tx-to" placeholder="Логін отримувача">
                <input type="number" id="tx-amt" placeholder="Кількість">
                <button id="sendBtn" style="background:var(--g); color:#000; margin-top:10px;">SEND NOW</button>
            </div>
            <p style="font-size:11px; color:#444; text-align:center;">Комісія мережі: 0.00 STK</p>
        </div>

        <!-- Навігація -->
        <nav>
            <div class="tab on" data-v="mine">MINE</div>
            <div class="tab" data-v="top">TOP</div>
            <div class="tab" data-v="tx">SEND</div>
            <div class="tab" id="exitBtn" style="color:var(--r)">EXIT</div>
        </nav>
    </div>
