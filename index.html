<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Farm</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #ffffff; --nav: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 450px; background: var(--card); position: relative; display: flex; flex-direction: column; }
        
        /* Екран входу */
        #auth-screen { padding: 40px 20px; text-align: center; height: 100%; justify-content: center; display: flex; flex-direction: column; }
        
        /* Контент */
        .content-area { flex-grow: 1; padding: 30px 20px; overflow-y: auto; padding-bottom: 80px; }
        .page { display: none; text-align: center; animation: fadeIn 0.3s; }
        .page.active { display: block; }

        h1, h2 { color: var(--accent); letter-spacing: 1px; }
        .balance-label { color: #7BEF; font-size: 0.9em; margin-top: 40px; }
        .balance { font-size: 3.5em; font-family: monospace; font-weight: bold; margin: 10px 0; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        
        button { width: 100%; padding: 14px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        /* Навігація знизу */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 70px; background: var(--nav); display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #777; font-size: 0.8em; transition: 0.3s; }
        .nav-item.active { color: var(--accent); background: rgba(7, 255, 255, 0.05); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        .logout-btn { background: #2a1010; color: #ff4444; border: 1px solid #442222; margin-top: 40px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- Екран входу -->
        <div id="auth-screen">
            <h1>STICK FARM</h1>
            <input type="text" id="userIn" placeholder="Логін">
            <input type="password" id="passIn" placeholder="Пароль">
            <button onclick="login()">УВІЙТИ</button>
        </div>

        <!-- Головний інтерфейс (прихований до логіну) -->
        <div id="main-ui" style="display: none; height: 100%;">
            <div class="content-area">
                
                <!-- Вкладка Баланс -->
                <div id="page-home" class="page active">
                    <h2 id="user-display">USER</h2>
                    <div class="balance-label">ПОТОЧНИЙ БАЛАНС</div>
                    <div class="balance" id="balance-num">0.00000</div>
                    <p style="color: #555; font-size: 0.8em;" id="sync-time">Синхронізація...</p>
                </div>

                <!-- Вкладка Налаштування -->
                <div id="page-settings" class="page">
                    <h2>НАЛАШТУВАННЯ</h2>
                    <div style="text-align: left; margin-top: 30px;">
                        <label style="font-size: 0.8em; color: #777; margin-left: 5px;">ЗМІНИТИ ПАРОЛЬ</label>
                        <input type="password" id="newPass" placeholder="Новий пароль">
                        <button onclick="changePassword()">ОНОВИТИ ПАРОЛЬ</button>
                    </div>
                    
                    <button class="logout-btn" onclick="logout()">ВИЙТИ З АКАУНТА</button>
                </div>

            </div>

            <!-- Нижня панель навігації -->
            <div class="nav-bar">
                <div class="nav-item active" onclick="switchTab('home', this)">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                    <span>Головна</span>
                </div>
                <div class="nav-item" onclick="switchTab('settings', this)">
                    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                    <span>Налаштування</span>
                </div>
            </div>
        </div>
    </div>

<script>
    const BIN_ID = "6a04f5aaadc21f119a979f14";
    const MASTER_KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let currentUser = null;

    window.onload = () => {
        const saved = localStorage.getItem("stick_user");
        if (saved) { currentUser = saved; showMain(); }
    };

    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        el.classList.add('active');
    }

    async function login() {
        const u = document.getElementById("userIn").value.trim();
        const p = document.getElementById("passIn").value.trim();
        if(!u || !p) return alert("Заповніть поля!");

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" }
            });
            const data = await res.json();
            if (data.users[u] && data.users[u].password === p) {
                currentUser = u;
                localStorage.setItem("stick_user", u);
                showMain();
            } else alert("Помилка входу!");
        } catch (e) { alert("Помилка мережі"); }
    }

    function showMain() {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("main-ui").style.display = "block";
