<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #151515; padding: 30px; border-radius: 20px; max-width: 380px; margin: auto; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #07FF; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; color: black; margin-top: 10px; }
        #status { font-size: 0.8em; margin-top: 20px; color: #ff4444; font-family: monospace; }
        .page { display: none; }
        .active { display: block; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #333; }
        .nav-btn { flex: 1; padding: 20px; cursor: pointer; color: #666; }
        .nav-btn.active { color: #07FF; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h1 style="color:#07FF">STICK COIN</h1>
        <input type="text" id="u" placeholder="Логін (Svat_ferm)">
        <input type="password" id="p" placeholder="Пароль">
        <button onclick="doLogin()">УВІЙТИ</button>
        <div id="status"></div>
    </div>

    <div id="main-ui" style="display:none">
        <div id="page-1" class="page active">
            <h2 style="color:#07FF">БАЛАНС</h2>
            <div style="font-size: 3em; font-family: monospace; margin: 20px 0;" id="bal">0.00000</div>
            <button id="mBtn" onclick="toggleM()" style="background:#00ff88">ПОЧАТИ МАЙНІНГ</button>
            <p id="st-text" style="color:#666; margin-top:20px;">Статус: Готовий</p>
        </div>
        
        <div id="page-2" class="page"><h2>ДРУЗІ</h2><p>Список порожній</p></div>
        <div id="page-3" class="page"><h2>ІНФО</h2><p>Stick Coin v2.0</p></div>

        <div class="nav">
            <div class="nav-btn" onclick="tab(2)">Друзі</div>
            <div class="nav-btn active" id="t1" onclick="tab(1)">Майнінг</div>
            <div class="nav-btn" onclick="tab(3)">Інфо</div>
        </div>
    </div>

<script>
    const BIN_ID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let user = null, isM = false, loc = 0, cloud = 0;

    async function doLogin() {
        const uIn = document.getElementById('u').value.trim();
        const pIn = document.getElementById('p').value.trim();
        const stat = document.getElementById('status');

        stat.style.color = "white";
        stat.innerText = "⏳ Перевірка даних...";

        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"}
            });
            const d = await r.json();
            const users = d.users || (d.record ? d.record.users : null);

            if (users && users[uIn] && String(users[uIn].password) === String(pIn)) {
                user = uIn;
                cloud = users[uIn].balance || 0;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                upd();
            } else {
                stat.style.color = "#ff4444";
                stat.innerText = "❌ Помилка: Невірний логін або пароль";
            }
        } catch (e) {
            stat.style.color = "#ff4444";
            stat.innerText = "⚠️ Помилка мережі: " + e.message;
        }
    }

    function tab(n) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+n).classList.add('active');
        if(n===1) document.getElementById('t1').classList.add('active');
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('mBtn');
        if(isM) {
            b.innerText = "ЗУПИНИТИ"; b.style.background = "#ff4444";
            loop();
        } else {
            b.innerText = "ПОЧАТИ МАЙНІНГ"; b.style.background = "#00ff88";
            sync();
        }
    }

    function loop() { if(isM) { loc += 0.00001; upd(); setTimeout(loop, 1000); } }
    function upd() { document.getElementById('bal').innerText = (cloud + loc).toFixed(5); }

    async function sync() {
        document.getElementById('st-text').innerText = "⏳ Збереження...";
        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {headers:{"X-Master-Key": KEY, "X-Bin-Meta": "false"}});
            let d = await r.json();
            let root = d.record ? d.record : d;
            root.users[user].balance += loc;
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: "PUT",
                headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                body: JSON.stringify(root)
            });
            cloud += loc; loc = 0; upd();
            document.getElementById('st-text').innerText = "✅ Збережено";
        } catch (e) { document.getElementById('st-text').innerText = "❌ Помилка"; }
    }
</script>
</body>
</html>
