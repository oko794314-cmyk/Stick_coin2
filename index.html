<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Farm</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(0,255,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 0.85em; min-height: 1.2em; }
        .hidden { display: none; }
        .balance { font-size: 3em; color: var(--accent); margin: 20px 0; font-family: monospace; }
    </style>
</head>
<body>

    <!-- Екран входу -->
    <div id="login-box" class="container">
        <h2 style="color:var(--accent)">STICK FARM</h2>
        <input type="text" id="userIn" placeholder="Логін">
        <input type="password" id="passIn" placeholder="Пароль">
        <button onclick="doLogin()">УВІЙТИ</button>
        <div id="status"></div>
    </div>

    <!-- Екран кабінету -->
    <div id="main-box" class="container hidden">
        <h2 id="display-name">---</h2>
        <div class="balance" id="bal">0.00000</div>
        <button onclick="location.reload()" style="background:#333; color:white">ВИЙТИ</button>
    </div>

<script>
    const BIN_ID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";

    async function doLogin() {
        const u = document.getElementById("userIn").value.trim();
        const p = document.getElementById("passIn").value.trim();
        const stat = document.getElementById("status");

        if (!u || !p) { stat.innerText = "⚠️ Введіть дані"; return; }
        
        stat.style.color = "white";
        stat.innerText = "⏳ Завантаження бази...";

        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                method: 'GET',
                headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" }
            });

            if (!response.ok) {
                throw new Error(`Сервер відмовив: ${response.status}`);
            }

            const data = await response.json();
            // Спроба знайти список користувачів у різних форматах JSON
            const users = data.users || (data.record ? data.record.users : null);

            if (!users) {
                stat.style.color = "red";
                stat.innerText = "❌ Помилка: База порожня або невірна структура";
                return;
            }

            if (users[u] && users[u].password === p) {
                stat.style.color = "#0f0";
                stat.innerText = "✅ Успішно! Входимо...";
                
                setTimeout(() => {
                    document.getElementById("login-box").classList.add("hidden");
                    document.getElementById("main-box").classList.remove("hidden");
                    document.getElementById("display-name").innerText = u.toUpperCase();
                    document.getElementById("bal").innerText = users[u].balance.toFixed(5);
                }, 1000);
            } else {
                stat.style.color = "red";
                stat.innerText = "❌ Невірний логін або пароль";
            }

        } catch (err) {
            stat.style.color = "red";
            stat.innerText = "⚠️ Помилка мережі: " + err.message;
            console.error(err);
        }
    }
</script>
</body>
</html>
