<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Fix</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { background: #121212; padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; width: 300px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #07FF; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #app { display: none; text-align: center; }
        .bal { font-size: 3rem; color: #07FF; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h2>STICK COIN</h2>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button id="login-btn">УВІЙТИ</button>
            <p id="msg" style="font-size: 12px; color: #555; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="app">
        <p>Вітаємо, <span id="user-display"></span>!</p>
        <div class="bal" id="bal-display">0.00</div>
        <button id="mine-btn" style="background: #00ff88; margin-top: 20px;">MINE</button>
        <button onclick="location.reload()" style="background: #ff4444; margin-top: 10px;">EXIT</button>
    </div>

    <script>
        // Твої дані для підключення
        const BID = "6a04f5aaadc21f119a979f14";
        const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";

        let db, currentStatus = 0;

        // Обробка натискання кнопки через ID (так надійніше, ніж через onclick у HTML)
        document.getElementById('login-btn').onclick = async () => {
            const userInp = document.getElementById('u').value.trim().toLowerCase();
            const passInp = document.getElementById('p').value.trim();
            const msg = document.getElementById('msg');

            msg.innerText = "⏳ Завантаження...";

            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                    headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" }
                });
                
                if (!res.ok) throw new Error("Помилка зв'язку з сервером");
                
                db = await res.json();

                // Перевірка користувача в базі
                if (db.users && db.users[userInp] && String(db.users[userInp].password) === String(passInp)) {
                    // Успішний вхід
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    document.getElementById('user-display').innerText = userInp;
                    document.getElementById('bal-display').innerText = db.users[userInp].balance.toFixed(2);
                } else {
                    alert("Невірний логін або пароль!");
                }
            } catch (e) {
                alert("Критична помилка: " + e.message);
            } finally {
                msg.innerText = "";
            }
        };

        // Простий майнінг для перевірки
        document.getElementById('mine-btn').onclick = () => {
            currentStatus += 0.01;
            const currentBal = parseFloat(document.getElementById('bal-display').innerText);
            document.getElementById('bal-display').innerText = (currentBal + 0.01).toFixed(2);
        };
    </script>
</body>
</html>
