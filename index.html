<script>
    const BIN_ID = "6a04f5aaadc21f119a979f14";
    const MASTER_KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let currentUser = null;

    window.onload = () => {
        const saved = localStorage.getItem("stick_user");
        if (saved) {
            currentUser = saved;
            showMain();
        }
    };

    async function login() {
        const u = document.getElementById("userIn").value.trim();
        const p = document.getElementById("passIn").value.trim();
        
        console.log("Спроба входу для:", u);

        if (!u || !p) {
            alert("Заповніть поля!");
            return;
        }

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                method: 'GET',
                headers: {
                    "X-Master-Key": MASTER_KEY,
                    "X-Bin-Meta": "false" // Це важливо, щоб отримати чистий JSON
                }
            });

            if (!res.ok) {
                throw new Error("Помилка сервера: " + res.status);
            }

            const data = await res.json();
            console.log("Дані з бази отримано:", data);

            // Перевірка структури
            if (data.users && data.users[u] && data.users[u].password === p) {
                currentUser = u;
                localStorage.setItem("stick_user", u);
                showMain();
            } else {
                alert("Невірний логін або пароль! Перевірте базу JSONBin.");
            }
        } catch (err) {
            console.error("Критична помилка:", err);
            alert("Не вдалося підключитися до бази: " + err.message);
        }
    }

    function showMain() {
        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("main-screen").style.display = "block";
        document.getElementById("welcome-msg").innerText = currentUser.toUpperCase();
        updateBalance();
        setInterval(updateBalance, 10000);
    }

    async function updateBalance() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" }
            });
            const data = await res.json();
            const bal = data.users[currentUser].balance;
            document.getElementById("balance-num").innerText = bal.toFixed(5);
        } catch (err) {
            console.log("Помилка оновлення балансу");
        }
    }

    async function changePassword() {
        const newP = document.getElementById("newPass").value.trim();
        if (newP.length < 4) return alert("Пароль закороткий");

        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": MASTER_KEY, "X-Bin-Meta": "false" }
            });
            let data = await res.json();
            data.users[currentUser].password = newP;

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: "PUT",
                headers: {
                    "X-Master-Key": MASTER_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });
            alert("Пароль змінено!");
        } catch (err) { alert("Помилка збереження"); }
    }

    function logout() {
        localStorage.removeItem("stick_user");
        location.reload();
    }
</script>
