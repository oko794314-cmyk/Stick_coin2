<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin OS</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #151515; --t: #fff; --g: #00ff88; --r: #ff4444; }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Екран входу */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 25px; background: var(--card); border-radius: 20px; border: 1px solid #333; }
        
        /* Додаток */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .view.on { display: block; }
        
        /* Дизайн елементів */
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: var(--p); color: #000; }
        
        /* Майнінг кнопка */
        .m-btn { width: 160px; height: 160px; border-radius: 80px; border: 5px solid var(--g); background: none; color: var(--g); font-size: 20px; margin: 20px auto; display: block; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .m-btn.active { border-color: var(--r); color: var(--r); }

        /* Навігація */
        nav { display: flex; background: #0a0a0a; border-top: 1px solid #222; }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 11px; color: #555; cursor: pointer; font-weight: bold; }
        .tab.on { color: var(--p); }
        
        .top-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h1>STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button onclick="login()">УВІЙТИ</button>
            <p id="msg" style="color:var(--r); font-size:12px; margin-top:10px"></p>
        </div>
    </div>

    <div id="app">
        <div style="padding:15px; text-align:center; font-weight:bold; border-bottom:1px solid #222">STICK OS <span id="user-tag" style="color:var(--p)"></span></div>

        <!-- МАЙНІНГ -->
        <div class="view on" id="v-mine">
            <div style="text-align:center; margin-top:30px">
                <p style="font-size:12px; color:#666">BALANCE</p>
                <h1 id="bal" style="font-size:3rem; margin:10px 0; font-family:monospace">0.00000</h1>
                <button id="m-btn" class="m-btn" onclick="toggleM()">START</button>
                <p id="status" style="font-size:10px; color:#444">Система готова</p>
            </div>
        </div>

        <!-- ТОП -->
        <div class="view" id="v-top">
            <h3>TOP HOLDERS</h3>
            <div class="card" id="top-list">Завантаження...</div>
        </div>

        <nav>
            <div class="tab on" onclick="tab('mine', this)">MINING</div>
            <div class="tab" onclick="tab('top', this)">TOP</div>
            <div class="tab" onclick="location.reload()">LOGOUT</div>
        </nav>
    </div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let db, cur, cloud = 0, loc = 0, isM = false;

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        document.getElementById('msg').innerText = "⏳ Connecting...";
        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {headers:{"X-Master-Key":KEY, "X-Bin-Meta":"false"}});
            const data = await r.json();
            db = data.record ? data.record : data;

            if(db.users[u] && String(db.users[u].password) === String(p)) {
                cur = u; cloud = db.users[u].balance || 0;
                document.getElementById('user-tag').innerText = "@" + u;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                upd(); renderTop();
            } else { document.getElementById('msg').innerText = "❌ Error login"; }
        } catch(e) { document.getElementById('msg').innerText = "⚠️ DB Error"; }
    }

    function tab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
        document.getElementById('v-'+id).classList.add('on');
        el.classList.add('on');
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('m-btn');
        if(isM) { b.innerText = "STOP"; b.classList.add('active'); loop(); }
        else { b.innerText = "START"; b.classList.remove('active'); sync(); }
    }

    function loop() { if(isM) { loc += 0.00002; upd(); setTimeout(loop, 1000); } }
    function upd() { document.getElementById('bal').innerText = (cloud + loc).toFixed(5); }

    async function sync() {
        document.getElementById('status').innerText = "⏳ Syncing...";
        db.users[cur].balance += loc;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BID}`, {
                method: "PUT", headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                body: JSON.stringify(db)
            });
            cloud += loc; loc = 0;
            document.getElementById('status').innerText = "✅ Saved";
            renderTop();
        } catch(e) { document.getElementById('status').innerText = "❌ Sync error"; }
    }

    function renderTop() {
        const list = document.getElementById('top-list');
        const sorted = Object.entries(db.users).sort((a,b) => b[1].balance - a[1].balance).slice(0, 5);
        list.innerHTML = sorted.map(([name, u], i) => `
            <div class="top-item">
                <span>#${i+1} ${name}</span>
                <b style="color:var(--p)">${u.balance.toFixed(2)}</b>
            </div>
        `).join('');
    }
</script>
</body>
</html>
