<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STICK FARM PRO ULTRA</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FF; --bg: #030303; --card: rgba(15, 15, 25, 0.95);
            --t: #ffffff; --g: #00ff88; --r: #ff3366; --gold: #ffcc00;
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); 
            color: var(--t); 
            margin: 0; 
            height: 100vh; 
            height: -webkit-fill-available; /* Для iOS */
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 0%, #0a1a3e 0%, #000 70%);
            z-index: -1;
        }

        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }

        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .auth-box { width: 85%; max-width: 340px; padding: 40px 25px; text-align: center; }

        input { width: 100%; padding: 14px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; background: var(--p); color: #000; cursor: pointer; text-transform: uppercase; }

        #app { display: none; flex-direction: column; height: 100vh; }

        .header { 
            padding: 15px 10px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            background: rgba(0,0,0,0.8); 
            border-bottom: 1px solid #222;
            padding-top: env(safe-area-inset-top, 15px);
        }
        .h-item { text-align: center; }
        .h-label { font-size: 8px; color: #666; display: block; }
        .h-val { font-size: 13px; color: var(--p); font-weight: 700; }

        .view { flex: 1; padding: 20px; display: none; overflow-y: auto; padding-bottom: 40px; }
        .view.on { display: block; }

        #bal { font-size: 2.8rem; font-weight: 900; text-align: center; margin: 25px 0; color: var(--p); text-shadow: 0 0 15px var(--p); }
        
        .m-orb { 
            width: 170px; height: 170px; border-radius: 50%; 
            border: 4px solid var(--g); margin: 0 auto; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; font-weight: 900;
        }
        .m-orb.active { border-color: var(--r); box-shadow: 0 0 30px var(--r); }

        .item-card { padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }

        /* НАВІГАЦІЯ - ВИПРАВЛЕНО */
        nav { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            background: #000; 
            border-top: 1px solid #222; 
            padding-top: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 10px)); /* Піднімає іконки вище смуги iOS */
            min-height: 70px;
        }
        .tab { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center; 
            font-size: 10px; /* Збільшено шрифт */
            color: #444; 
            cursor: pointer; 
            font-weight: 600;
        }
        .tab.on { 
            color: var(--p); 
            transform: translateY(-3px); /* Легкий підйом активної вкладки */
            transition: 0.2s;
        }
        .tab-icon { font-size: 22px; margin-bottom: 4px; } /* Місце під іконку або емодзі */

    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box glass">
            <h2>STICK<span style="color:var(--p)">FARM</span></h2>
            <input type="text" id="u" placeholder="ЛОГІН">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="abtn" class="btn">CONNECT</button>
            <div id="tlink" style="margin-top:20px; font-size:10px; color:#555;">РЕЄСТРАЦІЯ</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div class="h-item"><span class="h-label">BALANCE</span><span id="h-bal" class="h-val">0.00</span></div>
            <div class="h-item"><span class="h-label">LEVEL</span><span id="h-lvl" class="h-val">1</span></div>
            <div class="h-item"><span class="h-label">NODES</span><span id="h-nodes" class="h-val">0</span></div>
        </div>

        <div id="v-mine" class="view on">
            <div id="bal">0.00000</div>
            <div id="mbtn" class="m-orb">START</div>
            <p style="text-align:center; margin-top:30px; font-size:10px; color:var(--g);">SYSTEM ACTIVE</p>
        </div>

        <div id="v-social" class="view">
            <h4 style="margin-bottom:15px">LEADERBOARD</h4>
            <div id="leaderboard"></div>
        </div>

        <div id="v-tx" class="view">
            <h4>TRANSFER</h4>
            <div class="glass" style="padding:20px">
                <input type="text" id="tx-to" placeholder="RECIPIENT">
                <input type="number" id="tx-amt" placeholder="AMOUNT">
                <button onclick="sendSTK()" class="btn">SEND</button>
            </div>
        </div>

        <div id="v-games" class="view">
            <h4>CASINO</h4>
            <div class="glass" style="padding:20px; text-align:center;">
                <input type="number" id="bet-amt" placeholder="BET STK">
                <button onclick="playDouble()" class="btn" style="background:var(--gold); margin-top:10px;">PLAY DOUBLE</button>
            </div>
        </div>

        <div id="v-os" class="view">
            <h4>OS</h4>
            <div class="glass item-card"><span>ID:</span> <span id="prof-id" style="color:var(--p)">---</span></div>
            <button onclick="logout()" class="btn" style="background:var(--r); color:#fff; margin-top:20px;">EXIT</button>
        </div>

        <nav>
            <div class="tab on" id="t-mine"><div class="tab-icon">⛏️</div>MINE</div>
            <div class="tab" id="t-social"><div class="tab-icon">🏆</div>TOP</div>
            <div class="tab" id="t-tx"><div class="tab-icon">💸</div>SEND</div>
            <div class="tab" id="t-games"><div class="tab-icon">🎰</div>GAME</div>
            <div class="tab" id="t-os"><div class="tab-icon">⚙️</div>OS</div>
        </nav>
    </div>

    <script>
