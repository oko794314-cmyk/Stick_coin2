<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin OS</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #121212; --t: #fff; --g: #00ff88; --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Авторизація */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 30px; background: var(--card); border-radius: 24px; border: 1px solid #222; }
        
        /* Додаток */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .view.on { display: block; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; background: var(--p); color: #000; }
        
        /* Майнінг */
        .m-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--g); background: none; color: var(--g); font-size: 24px; margin: 30px auto; display: block; font-weight: 900; }
        .m-btn.active { border-color: var(--r); color: var(--r); }
        
        /* Меню */
        nav { display: flex; background: #080808; border-top: 1px solid #181818; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 11px; color: #444; cursor: pointer; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }
        
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
        #amsg { margin-top: 10px; font-size: 12px; color: var(--p); min-height: 1.2em; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h1 id="atitle">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button id="abtn">УВІЙТИ</button>
            <div id="amsg"></div>
            <div id="tlink" style="margin-top:20px; font-size:12px; color:#555; cursor:pointer;">Створити новий акаунт</div>
        </div>
    </div>

    <div id="app">
        <div style="padding:10px; text-align:center; font-size:10px; color:#444; border-bottom: 1px solid #111;">
            USER: <span id="utag" style="color:var(--p)">---</span>
        </div>

        <div class="view on" id="v-mine">
            <div style="text-align:center;">
                <h1 id="bal" style="font-size:3.5rem; margin:20px 0; font-family:monospace;">0.00000</h1>
                <button id="m-btn" class="m-btn">START</button>
                <p id="m-status" style="color:#444">READY</p>
            </div>
        </div>

        <div class="view" id="v-top">
            <h2 style="text-align:center;">TOP HOLDERS</h2>
            <div id="top-list"></div>
        </div>

        <div class="view" id="v-tx">
            <h2 style="text-align:center;">SEND COINS</h2>
            <div class="card">
                <input type="text" id="tx-to" placeholder="Логін отримувача">
                <input type="number" id="tx-amt" placeholder="Кількість">
                <button id="sendBtn" style="background:var(--g)">SEND</button>
            </div>
        </div>

        <nav>
            <div class="tab on" data-v="mine">MINE</div>
            <div class="tab" data-v="top">TOP</div>
            <div class="tab" data-v="tx">SEND</div>
            <div id="exitBtn" class="tab" style="color:var(--r)">EXIT</div>
        </nav>
    </div>

    <script>

            const abtn = document.getElementById('abtn');
            const amsg = document.getElementById('amsg');

            const mbtn = document.getElementById('m-btn');

            // Реєстрація / Вхід
            tlink.onclick = () => {
                isReg = !isReg;

                tlink.innerText = isReg ? "Вже є акаунт? Увійти" : "Створити новий акаунт";
            };

            // Головна кнопка входу
            abtn.onclick = async () => {
                const u = document.getElementById('u').value.trim().toLowerCase();
                const p = document.getElementById('p').value.trim();
                if (!u || !p) return alert("Заповни поля!");

                amsg.innerText = "⏳ З'єднання...";
                try {
                    // Захист від кешу через додавання випадкового параметра до URL
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest?c=${Math.random()}`, {
                        headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" }
                    });
                    db = await res.json();

                    if (isReg) {
                        if (db.users[u]) return alert("Логін зайнятий!");
                        db.users[u] = { password: p, balance: 1.0 };
                        await sync();
                        alert("Акаунт створено!");
                        tlink.onclick();
                    } else {
                        // Перевірка даних
                        if (db.users && db.users[u] && String(db.users[u].password) === String(p)) {
                            cur = u;
                            cloud = db.users[u].balance || 0;
                            document.getElementById('utag').innerText = u.toUpperCase();
                            document.getElementById('auth-screen').style.display = 'none';
                            document.getElementById('app').style.display = 'flex';
                            updateUI();
                        } else alert("Помилка входу!");
                    }
                } catch (e) { alert("Помилка: " + e.message); }
                amsg.innerText = "";
            };
