<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin OS</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --c: #111; --t: #eee; --g: #00ff88; --r: #ff4444; }
        body { background: var(--bg); color: var(--t); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; }
        #app { display: none; height: 100vh; flex-direction: column; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .view.on { display: block; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 12px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: var(--p); color: #000; }
        .card { background: var(--c); padding: 15px; border-radius: 16px; margin-bottom: 12px; border: 1px solid #222; }
        nav { display: flex; background: #0a0a0a; border-top: 1px solid #222; }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 10px; font-weight: bold; color: #555; cursor: pointer; }
        .tab.on { color: var(--p); box-shadow: inset 0 3px 0 var(--p); }
        .top-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h1 onclick="fill()" style="cursor:pointer">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button onclick="login()">УВІЙТИ</button>
            <p id="msg" style="font-size:12px; color:#555; margin-top:15px"></p>
        </div>
    </div>

    <div id="app">
        <div class="view on" id="v-mine">
            <div style="text-align: center; margin-top: 40px;">
                <p style="color:#666; font-size:12px">БАЛАНС STK</p>
                <div id="bal" style="font-size:3.5rem; font-family:monospace; color:var(--p); margin:10px 0">0.00000</div>
                <button id="m-btn" style="background:var(--g); width:180px; border-radius:30px; margin-top:20px" onclick="toggleM()">СТАРТ</button>
                <p id="st-info" style="font-size:10px; color:#444; margin-top:15px">● Система готова</p>
            </div>
        </div>

        <div class="view" id="v-market">
            <h3 style="color:var(--p)">ЛІДЕРИ</h3>
            <div class="card" id="top-list">Завантаження...</div>
            <h3 style="color:var(--p)">ПЕРЕКАЗ</h3>
            <div class="card">
                <input type="text" id="tx-to" placeholder="Логін">
                <input type="number" id="tx-amount" placeholder="Сума">
                <button onclick="sendSTK()">ВІДПРАВИТИ</button>
            </div>
        </div>

        <nav>
            <div class="tab" onclick="tab('market', this)">МАРКЕТ</div>
            <div class="tab on" onclick="tab('mine', this)">МАЙНІНГ</div>
            <div class="tab" onclick="location.reload()">ВИХІД</div>
        </nav>
    </div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let cur = null, isM = false, loc = 0, cloud = 0, db = null;

    function fill() { document.getElementById('u').value = "Svat_ferm"; document.getElementById('p').value = "17092012"; }

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        document.getElementById('msg').innerText = "⏳ Підключення...";
        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {headers:{"X-Master-Key": KEY, "X-Bin-Meta": "false"}});
            const data = await r.json();
            // Гнучка перевірка структури (якщо є .record або просто об'єкт)
            db = data.record ? data.record : data;
            
            if(db.users[u] && String(db.users[u].password) === String(p)) {
                cur = u; cloud = db.users[u].balance || 0;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                upd(); renderTop();
            } else { document.getElementById('msg').innerText = "❌ Невірний логін/пароль"; }
        } catch(e) { document.getElementById('msg').innerText = "⚠️ Помилка бази даних"; }
    }

    function tab(name, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
        document.getElementById('v-'+name).classList.add('on');
        el.classList.add('on');
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('m-btn');
        if(isM) { b.innerText = "ПАУЗА"; b.style.background = "var(--r)"; loop(); }
        else { b.innerText = "СТАРТ"; b.style.background = "var(--g)"; sync(); }
    }

    function loop() { if(isM) { loc += 0.00002; upd(); setTimeout(loop, 1000); } }
    function upd() { document.getElementById('bal').innerText = (cloud + loc).toFixed(5); }

    async function sync() {
        document.getElementById('st-info').innerText = "⏳ Збереження...";
        db.users[cur].balance += loc;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BID}`, {
                method: "PUT", headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                body: JSON.stringify(db)
            });
            cloud += loc; loc = 0;
            document.getElementById('st-info').innerText = "✅ Дані в хмарі";
            renderTop();
        } catch(e) { document.getElementById('st-info').innerText = "❌ Помилка синхронізації"; }
    }

    function renderTop() {
        const list = document.getElementById('top-list');
        const sorted = Object.entries(db.users).sort((a,b) => b[1].balance - a[1].balance).slice(0, 5);
        list.innerHTML = sorted.map(([name, u], i) => `
            <div class="top-item">
                <span>${i+1}. ${name}</span>
                <b style="color:var(--p)">${u.balance.toFixed(2)} STK</b>
            </div>
        `).join('');
    }

    async function sendSTK() {
        const to = document.getElementById('tx-to').value.trim();
        const amt = parseFloat(document.getElementById('tx-amount').value);
        if(!db.users[to] || amt <= 0 || (cloud + loc) < amt) return alert("Недостатньо коштів або юзера не існує");
