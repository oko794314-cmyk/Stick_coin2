<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick-Coin Auto-Miner</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; --card-bg: #161616; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; box-shadow: 0 0 20px rgba(0,255,204,0.1); }
        h1 { color: var(--neon); letter-spacing: 2px; text-transform: uppercase; }
        .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #333; }
        .tab { padding: 10px; cursor: pointer; color: #666; transition: 0.3s; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .balance-display { font-size: 48px; font-weight: bold; margin: 20px 0; color: white; text-shadow: 0 0 10px var(--neon); }
        .status-box { font-size: 14px; color: var(--neon); margin-bottom: 10px; opacity: 0.8; }
        .friends-list { text-align: left; max-height: 250px; overflow-y: auto; background: #0f0f0f; padding: 15px; border-radius: 12px; }
        .friend-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #222; font-size: 14px; }
        .hidden { display: none; }
        #status-msg { font-size: 12px; color: #555; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Stick-Coin 2.0</h1>
    <div id="login-section">
        <input type="text" id="user-input" placeholder="Логін вашої ферми">
        <input type="password" id="pass-input" placeholder="Пароль">
        <button class="btn" onclick="auth()">УВІЙТИ ТА ЗАПУСТИТИ</button>
        <p style="font-size: 11px; color: #666; margin-top: 15px;">*Якщо логіна немає, він створиться автоматично</p>
    </div>

    <div id="main-section" class="hidden">
        <div class="nav-tabs">
            <div class="tab active" id="tab-mine-btn" onclick="switchTab('mine')">МАЙНІНГ</div>
            <div class="tab" id="tab-friends-btn" onclick="switchTab('friends')">ТОП/ДРУЗІ</div>
            <div class="tab" id="tab-transfer-btn" onclick="switchTab('transfer')">ПЕРЕКАЗ</div>
        </div>

        <div id="tab-mine">
            <div class="status-box" id="farm-name">ФЕРМА АКТИВНА</div>
            <div class="balance-display" id="bal-val">0.00000</div>
            <p style="color: #666;">Авто-видобуток: <span style="color: var(--neon);">0.0001 STK/сек</span></p>
        </div>

        <div id="tab-friends" class="hidden">
            <div class="friends-list" id="friends-display"></div>
        </div>

        <div id="tab-transfer" class="hidden">
            <input type="text" id="target-user" placeholder="Кому (Логін)">
            <input type="number" id="transfer-amount" placeholder="Кількість">
            <button class="btn" onclick="processTransfer()">ВІДПРАВИТИ МОНЕТИ</button>
        </div>
    </div>
    <div id="status-msg">Система готова до запуску</div>
</div>

<script>
    const binID = "6a04f5aaadc21f119a979f14"; 
    const masterKey = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    const apiUrl = `https://api.jsonbin.io/v3/b/${binID}`;
    
    let currentUser = "";
    let userData = null;
    let autoSaveCounter = 0;

    // --- ФУНКЦІЯ ОЧИЩЕННЯ (запусти один раз, потім видали цей рядок) ---
    // resetDatabase(); 

    async function resetDatabase() {
        const cleanData = { users: {} };
        await fetch(apiUrl, { 
            method: 'PUT', 
            headers: {"X-Master-Key": masterKey, "Content-Type": "application/json"}, 
            body: JSON.stringify(cleanData) 
        });
        console.log("База очищена");
    }

    async function auth() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        if(!u || !p) return;

        document.getElementById('status-msg').innerText = "Підключення до мережі...";
        
        try {
            const res = await fetch(apiUrl + "/latest", { headers: {"X-Master-Key": masterKey} });
            const data = await res.json();
            userData = data.record;

            if(!userData.users[u]) {
                userData.users[u] = { pass: p, balance: 0 };
                await save();
            } else if(userData.users[u].pass !== p) {
                alert("Невірний пароль!"); 
                return;
            }

            currentUser = u;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('farm-name').innerText = "ПРАЦЮЄ ФЕРМА: " + u;
            document.getElementById('status-msg').innerText = "Синхронізація завершена";

            startMining();
        } catch(e) { 
            alert("Помилка зв'язку з сервером"); 
        }
    }

    function startMining() {
        setInterval(() => {
            // Нараховуємо монети
            userData.users[currentUser].balance += 0.0001;
            document.getElementById('bal-val').innerText = userData.users[currentUser].balance.toFixed(5);
            
            // Авто-збереження кожні 20 секунд (або при рандомі)
            autoSaveCounter++;
            if(autoSaveCounter >= 20) {
                save();
                autoSaveCounter = 0;
            }
        }, 1000);
    }

    function switchTab(t) {
        ['mine','friends','transfer'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('tab-'+t+'-btn').classList.add('active');
        if(t === 'friends') loadFriends();
    }

    function loadFriends() {
        const list = document.getElementById('friends-display');
        list.innerHTML = "";
        let sortedUsers = Object.keys(userData.users).sort((a,b) => userData.users[b].balance - userData.users[a].balance);
        
        sortedUsers.forEach(u => {
            list.innerHTML += `<div class="friend-item"><span>${u}</span><span>${userData.users[u].balance.toFixed(4)} STK</span></div>`;
        });
    }

    async function processTransfer() {
        const to = document.getElementById('target-user').value.trim();
        const amt = parseFloat(document.getElementById('transfer-amount').value);
        if(!userData.users[to] || userData.users[currentUser].balance < amt || amt <= 0) {
            alert("Помилка: Невірний юзер або мало коштів!");
            return;
        }
        userData.users[currentUser].balance -= amt;
        userData.users[to].balance += amt;
        await save();
        alert("Переказ успішний!");
        switchTab('mine');
    }

    async function save() {
        try {
            await fetch(apiUrl, { 
                method: 'PUT', 
                headers: {"X-Master-Key": masterKey, "Content-Type": "application/json"}, 
                body: JSON.stringify(userData) 
            });
            document.getElementById('status-msg').innerText = "Дані збережено в хмару: " + new Date().toLocaleTimeString();
        } catch(e) {
            document.getElementById('status-msg').innerText = "Помилка збереження!";
        }
    }
</script>
</body>
</html>
