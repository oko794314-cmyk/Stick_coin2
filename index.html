<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .screen { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .box { width: 100%; max-width: 300px; text-align: center; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #07FF; color: #000; }
        #app-ui { display: none; flex-direction: column; height: 100vh; }
        .page { display: none; flex: 1; padding: 20px; text-align: center; }
        .active { display: block; }
        .nav { display: flex; background: #0a0a0a; border-top: 1px solid #333; }
        .nav div { flex: 1; padding: 15px; text-align: center; font-size: 12px; color: #555; cursor: pointer; }
        .nav .on { color: #07FF; font-weight: bold; }
    </style>
</head>
<body>

    <!-- ВХІД -->
    <div id="auth-screen" class="screen">
        <div class="box">
            <h1 onclick="fill()" style="cursor:pointer">STICK <span style="color:#07FF">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button onclick="login()">УВІЙТИ</button>
            <p id="msg" style="font-size:12px; color: gray; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- ДОДАТОК -->
    <div id="app-ui">
        <div id="p-mine" class="page active">
            <p style="color:#666; margin-top:40px">БАЛАНС</p>
            <h1 id="bal" style="font-size: 3rem; font-family: monospace;">0.00000</h1>
            <button id="m-btn" style="background:#0f8; width:150px; border-radius:30px" onclick="toggleM()">СТАРТ</button>
            <p id="st-info" style="font-size:10px; color:#444; margin-top:10px">Система онлайн</p>
        </div>

        <div id="p-more" class="page">
            <h3>ІНФОРМАЦІЯ</h3>
            <div style="background:#1a1a1a; padding:15px; border-radius:10px; text-align:left; margin-bottom:10px">
                Логін: <b id="i-u"></b><br>
                Баланс: <b id="i-b"></b>
            </div>
            <button style="background:red; color:#fff" onclick="location.reload()">ВИЙТИ</button>
        </div>

        <nav class="nav">
            <div id="n1" class="on" onclick="tab('mine')">МАЙНІНГ</div>
            <div id="n2" onclick="tab('more')">ІНШЕ</div>
        </nav>
    </div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let cur = null, isM = false, loc = 0, cloud = 0, db = null;

    function fill() {
        document.getElementById('u').value = "Svat_ferm";
        document.getElementById('p').value = "17092012";
    }

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const msg = document.getElementById('msg');
        msg.innerText = "⏳ Завантаження...";

        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"}
            });
            db = await r.json();
            const users = db.record ? db.record.users : db.users;

            if(users[u] && String(users[u].password) === String(p)) {
                cur = u;
                cloud = users[u].balance || 0;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-ui').style.display = 'flex';
                upd();
            } else {
                msg.innerText = "❌ Помилка входу";
            }
        } catch(e) {
            msg.innerText = "⚠️ Помилка з'єднання";
        }
    }

    function tab(name) {
        document.getElementById('p-mine').style.display = name === 'mine' ? 'block' : 'none';
        document.getElementById('p-more').style.display = name === 'more' ? 'block' : 'none';
        document.getElementById('n1').className = name === 'mine' ? 'on' : '';
        document.getElementById('n2').className = name === 'more' ? 'on' : '';
        
        if(name === 'more') {
            document.getElementById('i-u').innerText = cur;
            document.getElementById('i-b').innerText = (cloud + loc).toFixed(5);
        }
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('m-btn');
        if(isM) { b.innerText = "ПАУЗА"; b.style.background = "red"; loop(); }
        else { b.innerText = "СТАРТ"; b.style.background = "#0f8"; sync(); }
    }

    function loop() { if(isM) { loc += 0.00001; upd(); setTimeout(loop, 1000); } }
    function upd() { document.getElementById('bal').innerText = (cloud + loc).toFixed(5); }

    async function sync() {
        document.getElementById('st-info').innerText = "⏳ Збереження...";
        const users = db.record ? db.record.users : db.users;
        users[cur].balance += loc;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BID}`, {
                method: "PUT",
                headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                body: JSON.stringify(db.record ? db.record : db)
            });
            cloud += loc; loc = 0;
            document.getElementById('st-info').innerText = "✅ Збережено";
        } catch(e) { document.getElementById('st-info').innerText = "❌ Помилка"; }
    }
</script>
</body>
</html>
