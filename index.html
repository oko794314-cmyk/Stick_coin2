<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin - Classic Mining</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #0077FF; 
            --bg: radial-gradient(circle at top, #0a1a2e 0%, #000000 100%);
            --card: rgba(15, 15, 30, 0.8);
            --t: #fff; --g: #00ff88; --r: #ff4444; 
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); border-radius: 25px; }

        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 30px; }

        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; text-align: center; }
        .view.on { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 10px; border-bottom: 1px solid rgba(7, 255, 255, 0.1); }
        .stat-val { display: block; color: var(--p); font-size: 13px; margin-top: 4px; }

        input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(0,0,0,0.4); border: 1px solid #222; color: #fff; border-radius: 12px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: bold; background: var(--p); color: #000; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.96); }

        /* Кнопка Майнінгу */
        .m-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--g); background: none; color: var(--g); font-size: 24px; margin: 40px auto; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .m-btn:hover { box-shadow: inset 0 0 20px rgba(0,255,136,0.3); }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 30px rgba(255,68,68,0.2); }

        .card { padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        nav { display: flex; background: rgba(0,0,0,0.9); border-top: 1px solid #111; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 11px; color: #444; cursor: pointer; }
        .tab.on { color: var(--p); font-weight: bold; border-top: 2px solid var(--p); }

        .invite-btn { width: auto; padding: 6px 12px; font-size: 10px; background: var(--g); color: #000; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box glass">
            <h2 style="letter-spacing: 5px;">STICK <span style="color:var(--p)">COIN</span></h2>
            <input type="text" id="u" placeholder="ЛОГІН">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="abtn">УВІЙТИ</button>
            <p id="tlink" style="margin-top:20px; font-size:11px; color:#555; cursor:pointer;">СТВОРИТИ АКАУНТ</p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div>БАЛАНС<span id="stat-bal" class="stat-val">0.00</span></div>
            <div>ПРИСТРОЇ<span id="stat-nodes" class="stat-val">1</span></div>
            <div>ДРУЗІ<span id="stat-friends" class="stat-val">0</span></div>
        </div>

        <div id="v-mine" class="view on">
            <h1 id="bal" style="font-size:3.5rem; margin: 30px 0; letter-spacing: -2px;">0.00000</h1>
            <button id="mbtn" class="m-btn">START</button>
            <p id="m-status" style="color:#444; font-size:12px; letter-spacing: 2px;">SYSTEM IDLE</p>
        </div>

        <div id="v-social" class="view">
            <h3>ТОП ТА ПОШУК</h3>
            <div class="glass" style="padding: 15px; margin-bottom: 15px;">
                <input type="text" id="f-search" placeholder="Пошук за логіном...">
                <button id="f-add" style="background: var(--g); color: #000; font-size: 12px; margin-top: 10px;">ДОДАТИ ДРУГА</button>
            </div>
            <div id="friends-list" style="margin-top:20px;"></div>
        </div>

        <div id="v-games" class="view">
            <h3>GAMES ROOM</h3>
            <p style="color:#666">Оберіть гру з другом у списку SOCIAL</p>
        </div>

        <div id="v-profile" class="view">
            <h3>ПРОФІЛЬ</h3>
            <div class="glass card"><span>ID:</span> <span id="prof-id" style="color:var(--p)">---</span></div>
            <div class="glass card"><span>БАЛАНС:</span> <span id="prof-bal" style="color:var(--g)">0.00</span></div>
            <button id="logout-btn" style="background:var(--r); margin-top: 40px;">ВИХІД</button>
        </div>

        <nav>
            <div class="tab on" id="t-mine">MINING</div>
            <div class="tab" id="t-social">SOCIAL</div>
            <div class="tab" id="t-games">GAMES</div>
            <div class="tab" id="t-profile">OTHER</div>
        </nav>
    </div>

    <script>
        // ⚠️ ВАЖЛИВО: Переместіть SECRET ключ на сервер! Ніколи не розміщуйте його в клієнтському коді!
        const BID = "6a04f5aaadc21f119a979f14";
        const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
        let db = {}, cur = null, cloud = 0, loc = 0, isM = false, isReg = false, miningTimer = null;
        
        // Швидкість: 1 коїн за 3600 секунд (1 година)
        const RATE = 1 / 3600;

        window.onload = function() {
            // Переключення между входом і реєстрацією
            document.getElementById('tlink').onclick = () => {
                isReg = !isReg;
                document.querySelector('#auth-screen h2').innerText = isReg ? "РЕЄСТРАЦІЯ" : "STICK COIN";
                document.getElementById('abtn').innerText = isReg ? "СТВОРИТИ" : "УВІЙТИ";
            };

            // Вхід / Реєстрація
            document.getElementById('abtn').onclick = async () => {
                const u = document.getElementById('u').value.trim().toLowerCase();
                const p = document.getElementById('p').value.trim();
                
                if(!u || !p) return alert("Заповніть всі поля!");
                if(u.length < 3) return alert("Логін має бути мінімум 3 символи!");
                if(p.length < 4) return alert("Пароль має бути мінімум 4 символи!");
                
                try {
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, { 
                        headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"} 
                    });
                    
                    if(!res.ok) throw new Error("Помилка підключення до сервера");
                    
                    db = await res.json();
                    
                    if(!db.users) db.users = {};
                    
                    if(isReg) {
                        if(db.users[u]) return alert("Користувач вже існує!");
                        db.users[u] = { password: p, balance: 0.0, devices: 1, friends: [] };
                        await sync(); 
                        alert("Акаунт створено!");
                        location.reload();
                    } else {
                        if(db.users[u] && db.users[u].password === p) {
                            cur = u; 
                            cloud = db.users[u].balance || 0;
                            document.getElementById('prof-id').innerText = u;
                            document.getElementById('auth-screen').style.display = 'none';
                            document.getElementById('app').style.display = 'flex';
                            checkBackgroundMining();
                            upd();
                            initTabs();
                        } else {
                            alert("Невірний логін або пароль!");
                        }
                    }
                } catch(err) {
                    alert("Помилка: " + err.message);
                }
            };

            // ФУНКЦІЯ ФОНОВОГО МАЙНІНГУ
            function checkBackgroundMining() {
                const lastMine = localStorage.getItem(cur + "_lastMine");
                const now = Date.now();
                
                if(lastMine) {
                    const diff = (now - parseInt(lastMine)) / 1000;
                    const earned = diff * RATE;
                    cloud += earned;
                }
                
                localStorage.setItem(cur + "_lastMine", now);
            }

            // ОНОВЛЕННЯ ІНТЕРФЕЙСУ
            function upd() {
                if(!cur || !db.users || !db.users[cur]) return;
                
                const total = cloud + loc;
                document.getElementById('bal').innerText = total.toFixed(5);
                document.getElementById('stat-bal').innerText = total.toFixed(2);
                document.getElementById('prof-bal').innerText = total.toFixed(2);
                document.getElementById('stat-nodes').innerText = db.users[cur].devices || 1;
                document.getElementById('stat-friends').innerText = (db.users[cur].friends || []).length;
                document.getElementById('m-status').innerText = isM ? "МАЙНІНГ..." : "SYSTEM IDLE";
            }

            // МАЙНІНГ
            document.getElementById('mbtn').onclick = () => {
                if(!isM) {
                    isM = true;
                    document.getElementById('mbtn').classList.add('active');
                    let cnt = 0;
                    
                    miningTimer = setInterval(() => {
                        loc += RATE;
                        upd();
                        cnt++;
                        
                        if(cnt >= 60) {
                            clearInterval(miningTimer);
                            miningTimer = null;
                            isM = false;
                            document.getElementById('mbtn').classList.remove('active');
                            cloud += loc;
                            loc = 0;
                            sync();
                            upd();
                        }
                    }, 1000);
                }
            };

            // СИНХРОНІЗАЦІЯ З СЕРВЕРОМ
            async function sync() {
                if(!cur || !db.users || !db.users[cur]) return;
                
                try {
                    db.users[cur].balance = cloud;
                    
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${BID}`, {
                        method: 'PUT',
                        headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                        body: JSON.stringify(db)
                    });
                    
                    if(!res.ok) throw new Error("Помилка синхронізації");
                    
                    return await res.json();
                } catch(err) {
                    console.error("Sync error:", err);
                }
            }

            // ТАБУЛЯЦІЯ
            function initTabs() {
                ['mine', 'social', 'games', 'profile'].forEach((tab) => {
                    const tabElement = document.getElementById(`t-${tab}`);
                    if(tabElement) {
                        tabElement.onclick = () => {
                            document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
                            document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));
                            tabElement.classList.add('on');
                            const view = document.getElementById(`v-${tab}`);
                            if(view) view.classList.add('on');
                            if(tab === 'social') loadFriends();
                        };
                    }
                });
            }

            // ДОДАВАННЯ ДРУГА
            document.getElementById('f-add').onclick = async () => {
                const nodeId = document.getElementById('f-search').value.trim().toLowerCase();
                
                if(!nodeId || nodeId === cur) {
                    return alert('Невірний ID');
                }
                
                if(db.users && db.users[nodeId]) {
                    if(!db.users[cur].friends) db.users[cur].friends = [];
                    
                    if(!db.users[cur].friends.includes(nodeId)) {
                        db.users[cur].friends.push(nodeId);
                        await sync();
                        loadFriends();
                        upd();
                        alert('Друга додано!');
                        document.getElementById('f-search').value = '';
                    } else {
                        alert('Цей користувач вже у ваших друзях');
                    }
                } else {
                    alert('Користувача не знайдено');
                }
            };

            // СПИСОК ДРУЗІВ
            function loadFriends() {
                const list = document.getElementById('friends-list');
                list.innerHTML = '';
                const friends = db.users[cur].friends || [];
                
                if(friends.length === 0) {
                    list.innerHTML = '<p style="color:#555;">Ви ще не маєте друзів</p>';
                    return;
                }
                
                friends.forEach((f) => {
                    const friendData = db.users[f] || {};
                    const div = document.createElement('div');
                    div.className = 'glass card';
                    div.innerHTML = `
                        <div style="text-align:left; flex:1;">
                            <strong>${sanitize(f)}</strong>
                            <p style="color:#888; font-size:10px; margin:3px 0;">Баланс: ${(friendData.balance || 0).toFixed(2)}</p>
                        </div>
                        <button class="invite-btn" onclick="alert('ВИКЛИК НАДІСЛАНО')">ВИКЛИК</button>
                    `;
                    list.appendChild(div);
                });
            }

            // ВИХІД
            document.getElementById('logout-btn').onclick = () => {
                if(miningTimer) clearInterval(miningTimer);
                cloud = 0;
                loc = 0;
                cur = null;
                db = {};
                isM = false;
                location.reload();
            };

            // ОНОВЛЕННЯ КОЖНУ СЕКУНДУ
            setInterval(() => {
                if(cur) upd();
            }, 1000);

            // Функція санітизації
            function sanitize(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        };
    </script>
</body>
</html>
