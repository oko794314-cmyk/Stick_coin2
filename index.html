<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin OS</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #121212; --t: #fff; --g: #00ff88; --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 30px; background: var(--card); border-radius: 24px; border: 1px solid #222; }
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; }
        .view.on { display: block; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; background: var(--p); color: #000; }
        .m-btn { width: 160px; height: 160px; border-radius: 50%; border: 6px solid var(--g); background: none; color: var(--g); font-size: 22px; margin: 30px auto; display: block; font-weight: 900; }
        .m-btn.active { border-color: var(--r); color: var(--r); }
        nav { display: flex; background: #080808; border-top: 1px solid #181818; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 10px; color: #444; cursor: pointer; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box">
            <h1 id="atitle">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button id="abtn">УВІЙТИ</button>
            <div id="amsg" style="margin-top:15px; font-size:12px; color:var(--p);"></div>
            <div id="tlink" style="margin-top:20px; font-size:12px; color:#555; text-decoration:underline; cursor:pointer;">Створити акаунт</div>
        </div>
    </div>

    <div id="app">
        <div style="padding:10px; text-align:center; font-size:10px; color:#444;">NODE: <span id="utag" style="color:var(--p)">---</span></div>
        <div class="view on" id="v-mine">
            <div style="text-align:center;">
                <h1 id="bal" style="font-size:3rem; margin:20px 0; font-family:monospace;">0.00000</h1>
                <button id="m-btn" class="m-btn">START</button>
                <p id="m-status" style="color:#444">READY</p>
            </div>
        </div>
        <div class="view" id="v-top"><h3>TOP HOLDERS</h3><div id="top-list"></div></div>
        <div class="view" id="v-tx">
            <h3>SEND</h3>
            <div class="card">
                <input type="text" id="tx-to" placeholder="Логін">
                <input type="number" id="tx-amt" placeholder="Сума">
                <button id="sendBtn" style="background:var(--g)">SEND</button>
            </div>
        </div>
        <nav>
            <div class="tab on" data-v="mine">MINE</div>
            <div class="tab" data-v="top">TOP</div>
            <div class="tab" data-v="tx">SEND</div>
            <div class="tab" id="logoutBtn">EXIT</div>
        </nav>
    </div>

    <script>
        (function() {
            const BID = "6a04f5aaadc21f119a979f14";
            const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";

            let db, cur, cloud = 0, loc = 0, isM = false, isReg = false;

            const elements = {
                u: document.getElementById('u'),
                p: document.getElementById('p'),
                abtn: document.getElementById('abtn'),
                atitle: document.getElementById('atitle'),
                tlink: document.getElementById('tlink'),
                amsg: document.getElementById('amsg'),
                app: document.getElementById('app'),
                auth: document.getElementById('auth-screen'),
                bal: document.getElementById('bal'),
                mbtn: document.getElementById('m-btn'),
                mstat: document.getElementById('m-status'),
                utag: document.getElementById('utag'),
                top: document.getElementById('top-list'),
                txto: document.getElementById('tx-to'),
                txamt: document.getElementById('tx-amt'),
                txbtn: document.getElementById('sendBtn')
            };

            elements.tlink.onclick = () => {
                isReg = !isReg;
                elements.atitle.innerText = isReg ? "REGISTRY" : "STICK COIN";
                elements.abtn.innerText = isReg ? "ЗАРЕЄСТРУВАТИСЯ" : "УВІЙТИ";
                elements.tlink.innerText = isReg ? "Вже є акаунт? Увійти" : "Створити акаунт";
            };

            elements.abtn.onclick = async () => {
                const u = elements.u.value.trim().toLowerCase();
                const p = elements.p.value.trim();
                if (!u || !p) return alert("Заповни поля!");

                elements.amsg.innerText = "⏳ Підключення...";
                try {
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                        headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" }
                    });
                    db = await res.json();

                    if (isReg) {
                        if (db.users[u]) return alert("Логін зайнятий!");
                        db.users[u] = { password: p, balance: 10 };
                        await syncData();
                        alert("Створено! Тепер увійдіть.");
                        elements.tlink.onclick();
                    } else {
                        if (db.users[u] && String(db.users[u].password) === String(p)) {
                            cur = u;
                            cloud = db.users[u].balance || 0;
                            elements.utag.innerText = u.toUpperCase();
                            elements.auth.style.display = 'none';
                            elements.app.style.display = 'flex';
                            updateUI();
                        } else alert("Невірні дані!");
                    }
                } catch (e) { alert("Помилка: " + e.message); }
                elements.amsg.innerText = "";
            };

            elements.mbtn.onclick = () => {
