<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Hub</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #ffffff; --nav: #1a1a1a; --green: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 450px; background: var(--card); position: relative; display: flex; flex-direction: column; }
        #auth-screen { padding: 40px 20px; text-align: center; height: 100%; justify-content: center; display: flex; flex-direction: column; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; color: black; text-transform: uppercase; }
        .content-area { flex-grow: 1; padding: 25px 20px; overflow-y: auto; padding-bottom: 90px; }
        .page { display: none; text-align: center; }
        .page.active { display: block; }
        .balance { font-size: 3em; font-family: monospace; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 75px; background: var(--nav); display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #666; font-size: 0.7em; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 0.9em; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-screen">
            <h1 style="color:var(--accent)">STICK COIN</h1>
            <input type="text" id="userIn" placeholder="Логін">

            <button class="btn" onclick="login()" id="loginBtn">УВІЙТИ</button>

                        <p id="status-text">Статус: Очікування</p>
                        <p id="session-earn">За сесію: +0.00000</p>
                    </div>
                </div>
                <div id="page-friends" class="page">
                    <h2>ДРУЗІ</h2>
                    <div class="list-item"><span>Користувач 1</span><span style="color:var(--green)">Online</span></div>
                </div>
                <div id="page-trans" class="page">
                    <h2>ПЕРЕКАЗИ</h2>
                    <div class="list-item"><span>Система</span><span style="color:var(--green)">+0.00540</span></div>
                </div>
            </div>
            <div class="nav-bar">
                <div class="nav-item" onclick="switchTab('friends', this)"><span>Друзі</span></div>

                <div class="nav-item" onclick="switchTab('trans', this)"><span>Перекази</span></div>
            </div>
        </div>
    </div>

    async function login() {
        const u = document.getElementById("userIn").value.trim().toLowerCase();
        const p = document.getElementById("passIn").value.trim();
        const err = document.getElementById("err");
        if(!u || !p) { err.innerText = "Введіть логін та пароль"; return; }
        
        err.style.color = "white";
        err.innerText = "⏳ З'єднання з сервером...";
        
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" }
            });
            
            if(!res.ok) throw new Error("HTTP Error: " + res.status);
            
            const data = await res.json();
            // Спроба знайти users у будь-якій структурі (напряму або в record)
            const users = data.users || (data.record ? data.record.users : null);

            if (!users) {
                throw new Error("JSON structure error: 'users' not found");
            }

            if (users[u] && String(users[u].password) === String(p)) {
                currentUser = u;
                cloudBalance = users[u].balance || 0;
                localStorage.setItem("stick_user", u);
                showMain();
            } else {
                err.style.color = "#ff4444";
                err.innerText = "❌ Невірний логін або пароль";
            }
        } catch (e) {
            err.style.color = "#ff4444";
            err.innerText = "⚠️ Помилка: " + e.message;
            console.error(e);
        }
    }

        document.getElementById("auth-screen").style.display = "none";
        document.getElementById("main-ui").style.display = "block";
        updateDisplay();
    }

        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        el.classList.add('active');
    }
