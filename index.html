<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin | Pro Edition</title>
    <style>
        :root {
            --p: #07FF; /* Основний блакитний */
            --bg: #050505;
            --card: rgba(25, 25, 25, 0.8);
            --t: #fff;
            --g: #00ff88;
            --r: #ff4444;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
            color: var(--t);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Екран входу */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: 0.5s;
        }

        .auth-box {
            width: 85%;
            max-width: 350px;
            padding: 30px;
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 0 30px rgba(7, 255, 255, 0.1);
        }

        /* Основний додаток */
        #app {
            display: none;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 1.2rem;
            border-bottom: 1px solid #111;
        }

        .view {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.on { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Елементи дизайну */
        .card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--p); box-shadow: 0 0 10px rgba(7, 255, 255, 0.2); }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-main { background: var(--p); color: #000; box-shadow: 0 4px 15px rgba(7, 255, 255, 0.3); }
        .btn-mine { background: var(--g); color: #000; font-size: 1.2rem; }
        .btn-stop { background: var(--r); color: #fff; }

        /* Навігація */
        nav {
            display: flex;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid #222;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab {
            flex: 1;
            padding: 15px 0;
            text-align: center;
            font-size: 10px;
            color: #555;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tab.on { color: var(--p); }
        .tab svg { width: 24px; height: 24px; margin: 0 auto; fill: currentColor; }

        /* Таблиця топів */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .top-row:last-child { border: none; }
        .rank { width: 30px; color: var(--p); font-weight: bold; }
        .name { flex: 1; margin-left: 10px; }
        .amt { font-family: monospace; color: var(--g); }
    </style>
</head>

        <div class="auth-box">
            <h1 style="margin:0 0 20px 0">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button class="btn-main" onclick="login()">Увійти в систему</button>
            <p id="err" style="color:var(--r); font-size:12px; margin-top:15px"></p>
        </div>
    </div>

    <div id="app">
        <div class="header">SYSTEM <span style="color:var(--p)">OS 2.0</span></div>

                <p id="st-info" style="color:#555; font-size: 12px;">Очікування команди...</p>

        <div class="view" id="v-top">

            </div>
        </div>
