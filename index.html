<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STICK FARM PRO ULTRA v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FFFF; 
            --bg: #030303; 
            --card: rgba(15, 15, 25, 0.95);
            --t: #ffffff; 
            --g: #00ff88; 
            --r: #ff3366; 
            --gold: #ffcc00;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Orbitron', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        body { 
            background: var(--bg); 
            color: var(--t); 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }

        /* Ефекти скла */
        .glass { 
            background: var(--card); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            padding: 15px;
            margin-bottom: 15px;
        }

        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            background: #0a0a0a; 
            border: 1px solid #222; 
            color: #fff; 
            border-radius: 8px; 
            font-size: 14px;
        }

        input:focus { border-color: var(--p); }

        .btn { 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 900; 
            background: var(--p); 
            color: #000; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .btn:active { transform: scale(0.98); opacity: 0.8; }

        /* Навігація та Екрани */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; display: none; overflow-y: auto; padding-bottom: 100px; }
        .view.on { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Header */
        .header { 
            padding: 20px; 
            display: flex; 
            justify-content: space-between; 
            background: #000; 
            border-bottom: 1px solid #111; 
            align-items: center; 
        }

        .avatar-sm { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            border: 2px solid var(--p); 
            object-fit: cover; 
            background: #111;
        }

        /* Roulette Casino */
        .casino-container { text-align: center; }
        .roulette-wrapper {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 20px auto;
        }
        .roulette-box { 
            width: 100%; 
            height: 100%; 
            border: 8px solid #1a1a1a; 
            border-radius: 50%; 
            transition: 5s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                var(--r) 0deg 170deg, 
                var(--g) 170deg 190deg, 
                #111 190deg 360deg
            );
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 20px solid var(--gold);
            z-index: 10;
        }

        /* Чат */
        #chat-box { 
            height: 250px; 
            overflow-y: auto; 
            padding: 10px; 
            display: flex; 
            flex-direction: column;
            gap: 8px;
        }
        .msg { font-size: 13px; line-height: 1.4; }
        .msg b { color: var(--p); text-transform: lowercase; }

        /* Хрестики Нолики */
        .ttt-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            max-width: 260px; 
            margin: 20px auto; 
        }
        .cell { 
            aspect-ratio: 1; 
            background: #0a0a0a; 
            border: 1px solid #222; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 30px; 
            font-weight: 900;
            border-radius: 8px;
        }

        /* Tab Bar */
        nav { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            background: #000; 
            border-top: 1px solid #111; 
            padding: 12px 0 25px 0; 
        }
        .tab { text-align: center; color: #444; font-size: 22px; cursor: pointer; transition: 0.3s; }
        .tab.on { color: var(--p); transform: translateY(-3px); }
        .tab span { display: block; font-size: 9px; font-weight: 600; text-transform: uppercase; margin-top: 4px; }

        /* Майнінг кнопка */
        .mine-orb {
            width: 180px; height: 180px;
            border-radius: 50%;
            margin: 40px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            border: 4px solid var(--g);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
            transition: 0.3s;
        }
        .mine-orb.active { border-color: var(--r); box-shadow: 0 0 30px rgba(255, 51, 102, 0.2); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

    </style>
</head>
<body>

    <div id="auth-screen" style="display:flex; align-items:center; justify-content:center; height:100vh; padding:20px;">
        <div class="glass" style="width:100%; max-width:350px; text-align:center; padding:40px 20px;">
            <h1 style="letter-spacing:8px; margin-bottom:30px;">STICK<span style="color:var(--p)">OS</span></h1>
            <input type="text" id="u" placeholder="ЛОГІН">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button class="btn" id="login-btn" style="margin-top:20px;">УВІЙТИ В СИСТЕМУ</button>
            <p id="reg-msg" style="font-size:10px; color:#555; margin-top:20px;">v3.0 PRO ULTRA EDITION</p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div>
                <span style="font-size:9px; color:#555; display:block;">OPERATOR</span>
                <b id="h-user">-
