<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Hub</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #ffffff; --nav: #1a1a1a; --green: #00ff88; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 100%; max-width: 450px; background: var(--card); position: relative; display: flex; flex-direction: column; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        
        /* Екран входу */
        #auth-screen { padding: 40px 20px; text-align: center; height: 100%; justify-content: center; display: flex; flex-direction: column; }
        input { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 14px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 10px; margin-top: 10px; color: black; text-transform: uppercase; }
        .btn-mine { background: var(--green); margin: 20px 0; font-size: 1.2em; }
        .btn-mine.active { background: #ff4444; }

        /* Контент */
        .content-area { flex-grow: 1; padding: 25px 20px; overflow-y: auto; padding-bottom: 90px; }
        .page { display: none; text-align: center; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }

        .balance { font-size: 3.2em; font-family: monospace; font-weight: bold; margin: 10px 0; color: var(--accent); text-shadow: 0 0 15px rgba(7, 255, 255, 0.2); }
        
        /* Навігація */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 75px; background: var(--nav); display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #666; font-size: 0.7em; }
        .nav-item.active { color: var(--accent); background: rgba(7, 255, 255, 0.05); }

        .list-item { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 3px solid var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- АВТОРИЗАЦІЯ -->
        <div id="auth-screen">
            <h1 style="color:var(--accent)">STICK COIN</h1>
            <p style="font-size: 0.8em; color: #555;">Введіть дані для доступу до майнінгу</p>
            <input type="text" id="userIn" placeholder="Логін">
            <input type="password" id="passIn" placeholder="Пароль">
            <button class="btn" onclick="login()">УВІЙТИ</button>
            <p id="err" style="color: #ff4444; font-size: 0.8em; margin-top: 10px; font-family: monospace;"></p>
        </div>

        <!-- ОСНОВНИЙ ІНТЕРФЕЙС -->
        <div id="main-ui" style="display: none; height: 100%;">
            <div class="content-area">
                
                <!-- МАЙНІНГ -->
                <div id="page-mine" class="page active">
                    <h2>МАЙНІНГ</h2>
                    <div style="font-size: 0.8em; color: #7BEF; margin-top: 20px;">ПОТОЧНИЙ БАЛАНС</div>
                    <div class="balance" id="bal">0.00000</div>
                    
                    <button id="mineBtn" class="btn btn-mine" onclick="toggleMining()">ПОЧАТИ МАЙНІНГ</button>
                    
                    <div style="background: #111; padding: 15px; border-radius: 10px; font-size: 0.8em; text-align: left;">
                        <p id="status-text">Статус: Готовий</p>
                        <p id="session-earn">Намайнено зараз: +0.00000</p>
                    </div>
                </div>

                <!-- ДРУЗІ -->
                <div id="page-friends" class="page">

                    <div class="list-item"><span>Користувач 1</span><span style="color:var(--green)">Online</span></div>
                    <div class="list-item"><span>Користувач 2</span><span style="color:#555">Offline</span></div>
                    <button class="btn" style="background:none; border:1px solid #444; color:#777;">+ Додати друга</button>
                </div>

                <!-- ТРАНЗАКЦІЇ -->
                <div id="page-trans" class="page">
                    <h2>ТРАНЗАКЦІЇ</h2>
                    <div class="list-item"><span>Бонус за реєстрацію</span><span style="color:var(--green)">+0.00500</span></div>
                    <div class="list-item"><span>Cloud Sync</span><span style="color:var(--accent)">Success</span></div>
                </div>

            </div>

            <!-- МЕНЮ -->
            <div class="nav-bar">
                <div class="nav-item" onclick="switchTab('friends', this)"><span>Друзі</span></div>
                <div class="nav-item active" onclick="switchTab('mine', this)"><span>Майнінг</span></div>
                <div class="nav-item" onclick="switchTab('trans', this)"><span>Перекази</span></div>
            </div>
        </div>
    </div>

        } catch (e) {
            err.style.color = "#ff4444";
            err.innerText = "⚠️ Помилка з'єднання: " + e.message;
        }
    }
