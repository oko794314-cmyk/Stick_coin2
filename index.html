<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 300px; text-align: center; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #07FF; color: #000; }
        #app { display: none; }
        .nav { display: flex; margin-top: 20px; border-top: 1px solid #333; }
        .nav div { flex: 1; padding: 10px; cursor: pointer; font-size: 12px; color: #666; }
        .nav .on { color: #07FF; }
    </style>
</head>
<body>

    <!-- ВХІД -->
    <div id="auth-screen">
        <div class="box">
            <h1 onclick="fill()" style="cursor:pointer">STICK <span style="color:#07FF">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button onclick="login()">УВІЙТИ</button>
            <p id="msg" style="font-size:12px; color: gray; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- ДОДАТОК -->
    <div id="app" class="box">
        <div id="p-mine">
            <p style="color:#666">БАЛАНС</p>
            <h1 id="bal">0.00000</h1>
            <button id="m-btn" style="background:#0f8" onclick="toggleM()">СТАРТ</button>
        </div>
        <div id="p-friends" style="display:none">
            <h3>ДРУЗІ</h3>
            <input type="text" id="f-name" placeholder="Логін">
            <button onclick="addF()">ДОДАТИ</button>
            <div id="f-list" style="margin-top:10px; font-size:14px"></div>
        </div>
        <div class="nav">
            <div id="n1" onclick="tab('mine')">МАЙНІНГ</div>
            <div id="n2" onclick="tab('friends')">ДРУЗІ</div>
            <div onclick="location.reload()">ВИХІД</div>
        </div>
    </div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let cur = null, isM = false, loc = 0, cloud = 0, db = null;

    function fill() {
        document.getElementById('u').value = "Svat_ferm";
        document.getElementById('p').value = "17092012";
    }

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const msg = document.getElementById('msg');
        msg.innerText = "⏳ Завантаження...";

        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"}
            });
            db = await r.json();
            const users = db.record ? db.record.users : db.users;

            if(users[u] && String(users[u].password) === String(p)) {
                cur = u;
                cloud = users[u].balance || 0;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                upd();
            } else {
                msg.innerText = "❌ Помилка: логін або пароль невірні";
                console.log("Доступні юзери:", Object.keys(users));
            }
        } catch(e) {
            msg.innerText = "⚠️ Помилка з'єднання: " + e.message;
        }
    }

    function tab(name) {
        document.getElementById('p-mine').style.display = name === 'mine' ? 'block' : 'none';
        document.getElementById('p-friends').style.display = name === 'friends' ? 'block' : 'none';
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('m-btn');
        if(isM) { b.innerText = "ПАУЗА"; b.style.background = "red"; loop(); }
        else { b.innerText = "СТАРТ"; b.style.background = "#0f8"; sync(); }
    }

    function loop() { if(isM) { loc += 0.00001; upd(); setTimeout(loop, 1000); } }
    function upd() { document.getElementById('bal').innerText = (cloud + loc).toFixed(5); }

    async function sync() {
        const users = db.record ? db.record.users : db.users;
        users[cur].balance += loc;
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BID}`, {
                method: "PUT",
                headers: {"X-Master-Key": KEY, "Content-Type": "application/json"},
                body: JSON.stringify(db.record ? db.record : db)
            });
            cloud += loc; loc = 0;
        } catch(e) { alert("Помилка збереження"); }
    }
</script>
</body>
</html>
