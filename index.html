<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Stick Coin Debug</title>
    <style>
        body { background: #000; color: #07FF; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { display: inline-block; padding: 20px; border: 1px solid #333; border-radius: 15px; }
        input { display: block; margin: 10px auto; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 15px 30px; background: #07FF; color: #000; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #log { margin-top: 20px; font-size: 10px; color: #555; white-space: pre-wrap; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; }
    </style>
</head>
<body>

    <div id="auth">
        <h1>STICK COIN</h1>
        <input type="text" id="u" placeholder="Логін">
        <input type="password" id="p" placeholder="Пароль">
        <button id="btn">УВІЙТИ</button>
        <div id="log"></div>
    </div>

    <div id="game" style="display:none">
        <h1>Успіх!</h1>
        <button onclick="location.reload()">ВИЙТИ</button>
    </div>

    <script>
        const log = (t) => { document.getElementById('log').innerText += "\n> " + t; console.log(t); };
        
        document.getElementById('btn').onclick = async () => {
            const u = document.getElementById('u').value.trim().toLowerCase();
            const p = document.getElementById('p').value.trim();
            const BID = "6a04f5aaadc21f119a979f14";
            const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";

            log("Початок авторизації...");
            
            try {
                log("Запит до JSONBin...");
                const res = await fetch("https://api.jsonbin.io/v3/b/" + BID + "/latest", {
                    headers: { "X-Master-Key": KEY, "X-Bin-Meta": "false" }
                });

                log("Статус відповіді: " + res.status);
                if (!res.ok) throw new Error("Сервер відхилив запит");

                const db = await res.json();
                log("Дані отримано. Шукаємо юзера: " + u);

                if (db.users && db.users[u]) {
                    log("Юзера знайдено. Перевірка пароля...");
                    if (String(db.users[u].password) === String(p)) {
                        log("Пароль вірний! Входимо...");
                        document.getElementById('auth').style.display = 'none';
                        document.getElementById('game').style.display = 'block';
                    } else {
                        log("Пароль НЕВІРНИЙ!");
                        alert("Невірний пароль");
                    }
                } else {
                    log("Юзера " + u + " немає в базі.");
                    alert("Юзера не знайдено");
                }
            } catch (e) {
                log("КРИТИЧНА ПОМИЛКА: " + e.message);
                alert("Помилка: " + e.message);
            }
        };
    </script>
</body>
</html>
