<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Farm OS v7.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #07FF; 
            --bg: radial-gradient(circle at top, #0a1a2e 0%, #000000 100%);
            --card: rgba(15, 15, 30, 0.9);
            --t: #fff; --g: #00ff88; --r: #ff4444; 
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; text-align: center; }
        
        /* Авторизація */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; padding: 30px; }

        /* Додаток */
        #app { display: none; flex-direction: column; height: 100vh; }
        .header { padding: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 10px; border-bottom: 1px solid #111; }
        .stat-val { display: block; color: var(--p); font-size: 13px; margin-top: 5px; }

        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; font-size: 14px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; background: var(--p); color: #000; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.8; }

        .m-btn { width: 160px; height: 160px; border-radius: 50%; border: 6px solid var(--g); background: none; color: var(--g); font-size: 22px; margin: 40px auto; display: flex; align-items: center; justify-content: center; transition: 0.3s; cursor: pointer; }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 30px rgba(255,68,68,0.2); }

        .view { flex: 1; padding: 20px; display: none; overflow-y: auto; }
        .view.on { display: block; }

        nav { display: flex; background: #000; border-top: 1px solid #111; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 18px 0; text-align: center; font-size: 10px; color: #555; cursor: pointer; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); }

        .card { padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="box glass">
            <h2 id="auth-title">STICK OS</h2>
            <input type="text" id="u" placeholder="ЛОГІН" autocomplete="off">
            <input type="password" id="p" placeholder="ПАРОЛЬ">
            <button id="abtn">CONNECT</button>
            <p id="tlink" style="margin-top:20px; font-size:10px; color:#555; cursor:pointer; text-decoration: underline;">Створити нову ферму</p>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div>БАЛАНС<span id="stat-bal" class="stat-val">0.00</span></div>
            <div>NODES<span id="active-nodes" class="stat-val">0</span></div>
            <div>SPEED<span id="stat-speed" class="stat-val">0x</span></div>
        </div>

        <div id="v-mine" class="view on" style="text-align:center;">
            <h1 id="bal" style="font-size:2.8rem; margin: 30px 0; color: var(--p); text-shadow: 0 0 10px rgba(7,255,255,0.3);">0.00000</h1>
            <div id="mbtn" class="m-btn">START</div>
            <p id="m-status" style="color:var(--g); font-size:11px; letter-spacing: 2px;">READY</p>
        </div>

        <div id="v-social" class="view">
            <h3 style="text-align:center; font-size: 14px;">TOP PLAYERS</h3>
            <div id="leaderboard"></div>
        </div>

        <div id="v-profile" class="view">
            <h3 style="text-align:center; font-size: 14px;">OS STATUS</h3>
            <div class="glass card"><span>NODE_ID:</span> <span id="prof-id" style="color:var(--p)">---</span></div>
            <button onclick="logout()" style="background:var(--r); margin-top: 30px; font-size: 12px;">DISCONNECT</button>
        </div>

        <nav>
            <div class="tab on" id="t-mine">MINE</div>
            <div class="tab" id="t-social">TOP</div>
            <div class="tab" id="t-profile">PROFILE</div>
        </nav>
    </div>
