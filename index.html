<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick-Coin 2.0 Pro</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0a0a0a; --card-bg: #161616; --text: #e0e0e0; --error: #ff4444; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; background: var(--card-bg); padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        h1 { color: var(--neon); letter-spacing: 2px; }
        .nav-tabs { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #333; }
        .tab { padding: 10px; cursor: pointer; color: #666; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-stop { background: var(--error); color: white; }
        .balance-display { font-size: 48px; font-weight: bold; margin: 20px 0; color: white; text-shadow: 0 0 10px var(--neon); }
        .status-indicator { font-size: 12px; margin-bottom: 10px; font-weight: bold; }
        .hidden { display: none; }
        .friends-list { text-align: left; max-height: 250px; overflow-y: auto; background: #0f0f0f; padding: 15px; border-radius: 12px; }
        .friend-item { display: flex; justify-content: space-between; padding: 10px 5px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
<div class="container">
    <h1>Stick-Coin 2.0</h1>
    
    <div id="login-section">
        <input type="text" id="user-input" placeholder="Логін">
        <input type="password" id="pass-input" placeholder="Пароль">
        <button class="btn" onclick="auth()">УВІЙТИ</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="nav-tabs">
            <div class="tab active" id="tab-mine-btn" onclick="switchTab('mine')">МАЙНІНГ</div>
            <div class="tab" id="tab-friends-btn" onclick="switchTab('friends')">ТОП</div>
            <div class="tab" id="tab-transfer-btn" onclick="switchTab('transfer')">ПЕРЕКАЗ</div>
        </div>

        <div id="tab-mine">
            <div id="mine-status" class="status-indicator" style="color: #666;">СТАТУС: ПАУЗА</div>
            <div class="balance-display" id="bal-val">0.00000</div>
            <button id="toggle-btn" class="btn" onclick="toggleMining()">ЗАПУСТИТИ МАЙНІНГ</button>
            <p style="font-size: 12px; color: #444; margin-top: 10px;">Швидкість: 0.0001 STK/сек</p>
        </div>

        <div id="tab-friends" class="hidden">
            <div class="friends-list" id="friends-display"></div>
        </div>

        <div id="tab-transfer" class="hidden">
            <input type="text" id="target-user" placeholder="Логін отримувача">
            <input type="number" id="transfer-amount" placeholder="Сума">
            <button class="btn" onclick="processTransfer()">ВІДПРАВИТИ</button>
        </div>
    </div>
    <div id="status-msg" style="font-size: 11px; color: #444; margin-top: 20px;">Очікування авторизації...</div>
</div>

<script>
    const binID = "6a04f5aaadc21f119a979f14"; 
    const masterKey = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    const apiUrl = `https://api.jsonbin.io/v3/b/${binID}`;
    
    let currentUser = "";
    let userData = null;
    let isMining = false;
    let mineInterval = null;
    let saveCounter = 0;

    async function auth() {
        const u = document.getElementById('user-input').value.trim();
        const p = document.getElementById('pass-input').value.trim();
        if(!u || !p) return;

        try {
            const res = await fetch(apiUrl + "/latest", { headers: {"X-Master-Key": masterKey} });
            const data = await res.json();
            userData = data.record;

            if(!userData.users[u]) {
                userData.users[u] = { pass: p, balance: 0 };
                await save();
            } else if(userData.users[u].pass !== p) {
                alert("Невірний пароль!"); return;
            }

            currentUser = u;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('bal-val').innerText = userData.users[currentUser].balance.toFixed(5);
            document.getElementById('status-msg').innerText = "Підключено як: " + u;
        } catch(e) { alert("Помилка мережі"); }
    }

    function toggleMining() {
        const btn = document.getElementById('toggle-btn');
        const status = document.getElementById('mine-status');

        if (!isMining) {
            // Вмикаємо
            isMining = true;
            btn.innerText = "ЗУПИНИТИ МАЙНІНГ";
            btn.classList.add('btn-stop');
            status.innerText = "СТАТУС: МАЙНІНГ ЗАПУЩЕНО";
            status.style.color = "var(--neon)";
            
            mineInterval = setInterval(() => {
                userData.users[currentUser].balance += 0.0001;
                document.getElementById('bal-val').innerText = userData.users[currentUser].balance.toFixed(5);
                
                saveCounter++;
                if(saveCounter >= 30) { // Автозбереження кожні 30 сек
                    save();
                    saveCounter = 0;
                }
            }, 1000);
        } else {
            // Вимикаємо
            isMining = false;
            btn.innerText = "ЗАПУСТИТИ МАЙНІНГ";
            btn.classList.remove('btn-stop');
            status.innerText = "СТАТУС: ПАУЗА";
            status.style.color = "#666";
            clearInterval(mineInterval);
            save(); // Зберігаємо при зупинці
        }
    }

    function switchTab(t) {
        ['mine','friends','transfer'].forEach(id => document.getElementById('tab-'+id).classList.add('hidden'));
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.getElementById('tab-'+t+'-btn').classList.add('active');
        if(t === 'friends') loadFriends();
    }

    function loadFriends() {
        const list = document.getElementById('friends-display');
        list.innerHTML = "";
        let sorted = Object.keys(userData.users).sort((a,b) => userData.users[b].balance - userData.users[a].balance);
        sorted.forEach(u => {
            list.innerHTML += `<div class="friend-item"><span>${u}</span><span>${userData.users[u].balance.toFixed(4)} STK</span></div>`;
        });
    }

    async function processTransfer() {
        const to = document.getElementById('target-user').value.trim();
        const amt = parseFloat(document.getElementById('transfer-amount').value);
        if(!userData.users[to] || userData.users[currentUser].balance < amt || amt <= 0) return alert("Помилка транзакції");
        
        userData.users[currentUser].balance -= amt;
        userData.users[to].balance += amt;
        await save();
        alert("Монети відправлено!");
        switchTab('mine');
    }

    async function save() {
        try {
            await fetch(apiUrl, { 
                method: 'PUT', 
                headers: {"X-Master-Key": masterKey, "Content-Type": "application/json"}, 
                body: JSON.stringify(userData) 
            });
        } catch(e) { console.log("Помилка збереження"); }
    }
</script>
</body>
</html>
