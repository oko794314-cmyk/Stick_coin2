<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stick Coin OS</title>
    <style>
        :root { --p: #07FF; --bg: #050505; --card: #121212; --t: #fff; --g: #00ff88; --r: #ff4444; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--t); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Авторизація */
        #auth-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .box { width: 85%; max-width: 320px; text-align: center; padding: 30px; background: var(--card); border-radius: 24px; border: 1px solid #222; }
        
        /* Основний застосунок */
        #app { display: none; flex-direction: column; height: 100vh; }
        .view { flex: 1; padding: 20px; overflow-y: auto; display: none; animation: fadeIn 0.3s; }
        .view.on { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Елементи інтерфейсу */
        .card { background: var(--card); padding: 18px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; }
        input { width: 100%; padding: 14px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; outline: none; font-size: 16px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; background: var(--p); color: #000; }
        button:active { transform: scale(0.97); }
        
        /* Кнопка Майнінгу */
        .m-btn { width: 180px; height: 180px; border-radius: 50%; border: 8px solid var(--g); background: none; color: var(--g); font-size: 24px; margin: 40px auto; display: block; font-weight: 900; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        .m-btn.active { border-color: var(--r); color: var(--r); box-shadow: 0 0 20px rgba(255,68,68,0.2); }

        /* Навігація */
        nav { display: flex; background: #080808; border-top: 1px solid #181818; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 11px; color: #555; cursor: pointer; transition: 0.3s; }
        .tab.on { color: var(--p); border-top: 2px solid var(--p); background: linear-gradient(to bottom, rgba(7,255,255,0.05), transparent); }
        
        .status-bar { padding: 10px; text-align: center; font-size: 10px; color: #444; border-bottom: 1px solid #111; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- Екран Входу -->
    <div id="auth-screen">
        <div class="box">
            <h1 id="atitle">STICK<span style="color:var(--p)">COIN</span></h1>
            <input type="text" id="u" placeholder="Логін">
            <input type="password" id="p" placeholder="Пароль">
            <button id="abtn" onclick="handleAuth()">УВІЙТИ</button>
            <div id="amsg" style="margin-top:15px; font-size:12px; color:var(--p)"></div>
            <div onclick="toggleMode()" id="tlink" style="margin-top:20px; font-size:13px; color:#666; text-decoration:underline">Немає акаунта? Створити</div>
        </div>
    </div>

    <!-- Основний екран -->
    <div id="app">
        <div class="status-bar">NODE: <span id="utag" style="color:var(--p)">---</span></div>

        <!-- Вкладка: Майнінг -->
        <div class="view on" id="v-mine">
            <div style="text-align:center; margin-top:20px">
                <p style="color:#666; margin-bottom:5px">ВАШ БАЛАНС</p>
                <h1 id="bal" style="font-size:3.5rem; margin:0; font-family: monospace;">0.00000</h1>
                <button id="m-btn" class="m-btn" onclick="toggleM()">START</button>
                <p id="m-status" style="color:#444">READY TO WORK</p>
            </div>
        </div>

        <!-- Вкладка: ТОП -->
        <div class="view" id="v-top">
            <h3 style="margin-bottom:20px">TOP HOLDERS</h3>
            <div id="top-list"></div>
        </div>

        <!-- Вкладка: Перекази -->
        <div class="view" id="v-tx">
            <h3>SEND COINS</h3>
            <div class="card">
                <input type="text" id="tx-to" placeholder="Кому (логін)">
                <input type="number" id="tx-amt" placeholder="Сума">
                <button style="background:var(--g)" onclick="sendSTK()">ВІДПРАВИТИ</button>
            </div>
            <p style="font-size:11px; color:#555">Комісія мережі: 0%</p>
        </div>

        <!-- Вкладка: Система -->
        <div class="view" id="v-sys">
            <h3>SYSTEM</h3>
            <div class="card">
                <p>Версія: 4.0 Stable</p>
                <p>Мережа: Mainnet</p>
            </div>
            <button style="background:#222; color:var(--r)" onclick="location.reload()">ВИЙТИ З АКАУНТА</button>
        </div>

        <!-- Меню -->
        <nav>
            <div class="tab on" onclick="tab('mine', this)">MINE</div>
            <div class="tab" onclick="tab('top', this)">TOP</div>
            <div class="tab" onclick="tab('tx', this)">SEND</div>
            <div class="tab" onclick="tab('sys', this)">SYS</div>
        </nav>
    </div>
