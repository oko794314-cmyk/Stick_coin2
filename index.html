<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Coin Pro</title>
    <style>
        :root { --accent: #07FF; --bg: #0a0a0a; --card: #151515; --text: #fff; --green: #00ff88; --red: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; overflow: hidden; }
        .container { width: 100%; max-width: 450px; height: 100vh; margin: auto; background: var(--card); position: relative; display: flex; flex-direction: column; }
        .screen { display: none; height: 100%; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .active-screen { display: flex; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-main { background: var(--accent); color: #000; }
        .page { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 80px; }
        .page.active { display: block; }
        .balance-big { font-size: 3.5em; font-family: monospace; color: var(--accent); margin: 20px 0; text-align: center; }
        .list-item { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .nav { position: absolute; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 0.8em; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--accent); background: #1a1a1a; }
        #debug-info { font-size: 0.7em; color: #555; text-align: center; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <!-- Екран входу -->
    <div id="auth-screen" class="screen active-screen">
        <h1 style="color:var(--accent); text-align:center; cursor:pointer" onclick="autoFill()">STICK COIN</h1>
        <input type="text" id="uIn" placeholder="Логін">
        <input type="password" id="pIn" placeholder="Пароль">
        <button class="btn btn-main" onclick="login()">УВІЙТИ</button>
        <p id="auth-err" style="color:var(--red); font-size:0.8em; text-align:center"></p>
        <div id="debug-info"></div>
    </div>

    <!-- Головний інтерфейс -->
    <div id="main-ui" class="screen">
        <div id="p-mine" class="page active">
            <h2 style="text-align:center">МАЙНІНГ</h2>
            <div class="balance-big" id="bal">0.00000</div>
            <button id="mBtn" class="btn" style="background:var(--green)" onclick="toggleM()">ПОЧАТИ</button>
            <p id="st-text" style="color:#666; text-align:center">Статус: Готовий</p>
        </div>

        <div id="p-friends" class="page">
            <h2>ДРУЗІ</h2>
            <input type="text" id="friendName" placeholder="Логін друга">
            <button class="btn btn-main" onclick="sendRequest()">Додати</button>
            <div id="incoming-reqs"></div>
            <div id="friends-list"></div>
        </div>

        <div id="p-info" class="page">
            <h2>ІНФО</h2>
            <div class="list-item">Логін: <b id="info-login"></b></div>
            <div class="list-item">Баланс: <b id="info-bal"></b></div>
            <button class="btn" style="background:var(--red); color:#fff; margin-top:20px" onclick="location.reload()">ВИЙТИ</button>
        </div>

        <div class="nav">
            <div class="nav-item" onclick="tab('friends', this)">Друзі</div>
            <div class="nav-item active" id="def-nav" onclick="tab('mine', this)">Майнінг</div>
            <div class="nav-item" onclick="tab('info', this)">Інфо</div>
        </div>
    </div>
</div>

<script>
    const BID = "6a04f5aaadc21f119a979f14";
    const KEY = "$2a$10$7yePq6PbDAjjMpk4.gfkWeIOrhlJpxaX7Io9/IM0FevWs37W5eaea";
    let currentUser = null, isM = false, loc = 0, cloud = 0, fullData = null;

    function autoFill() {
        document.getElementById('uIn').value = "Svat_ferm";
        document.getElementById('pIn').value = "17092012";
    }

    async function login() {
        const u = document.getElementById('uIn').value.trim();
        const p = document.getElementById('pIn').value.trim();
        const err = document.getElementById('auth-err');
        const dbg = document.getElementById('debug-info');
        
        err.innerText = "⏳ Завантаження...";
        dbg.innerText = "";

        try {
            const r = await fetch(`https://api.jsonbin.io/v3/b/${BID}/latest`, {
                headers: {"X-Master-Key": KEY, "X-Bin-Meta": "false"}
            });
            const d = await r.json();
            fullData = d.record ? d.record : d;
            const users = fullData.users;

            if(users && users[u] && String(users[u].password) === String(p)) {
                currentUser = u;
                cloud = users[u].balance || 0;
                if(!users[u].friends) users[u].friends = [];
                if(!users[u].requests) users[u].requests = [];
                
                document.getElementById('auth-screen').classList.remove('active-screen');
                document.getElementById('main-ui').classList.add('active-screen');
                upd();
                loadFriends();
            } else {
                err.innerText = "❌ Невірний логін або пароль";
                if(users) {
                    dbg.innerText = "В базі знайдено: " + Object.keys(users).join(", ");
                } else {
                    dbg.innerText = "Помилка: база не містить об'єкта users";
                }
            }
        } catch(e) {
            err.innerText = "⚠️ Помилка з'єднання";
            dbg.innerText = e.message;
        }
    }

    function tab(name, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('p-'+name).classList.add('active');
        el.classList.add('active');
        if(name === 'info') {
            document.getElementById('info-login').innerText = currentUser;
            document.getElementById('info-bal').innerText = (cloud + loc).toFixed(5);
        }
    }

    function toggleM() {
        isM = !isM;
        const b = document.getElementById('mBtn');
        if(isM) { b.innerText = "ЗУПИНИТИ"; b.style.background = "var(--red)"; loop(); }
        else { b.innerText = "ПОЧАТИ"; b.style.background = "var(--green)"; sync(); }
    }

    function loop() { if(isM) { loc += 0.00001; upd(); setTimeout(loop, 1000); } }
